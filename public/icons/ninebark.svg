  <line x1="78" y1="54" x2="86" y2="56" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Layered leaf clusters - 3-lobed maple-like leaves -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
