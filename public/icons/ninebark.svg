    <path d="M14,60 C11,56 8,54 10,52 C12,52 14,54 14,56 C14,54 16,52 18,52 C20,54 17,56 14,60Z"/>
    <!-- Cluster right -->
    <path d="M86,56 C83,52 80,50 82,48 C84,48 86,50 86,52 C86,50 88,48 90,48 C92,50 89,52 86,56Z"/>
