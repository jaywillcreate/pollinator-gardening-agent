    <path d="M82,22 C79,18 76,16 78,14 C80,14 82,16 82,18 C82,16 84,14 86,14 C88,16 85,18 82,22Z"/>
    <path d="M82,22 C86,22 88,20 90,22 C88,24 86,24 82,22Z"/>
