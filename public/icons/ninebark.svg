    <path d="M50,18 C47,14 44,12 46,10 C48,10 50,12 50,14 C50,12 52,10 54,10 C56,12 53,14 50,18Z"/>
    <path d="M50,18 C46,18 44,16 42,18 C44,20 46,20 50,18Z"/>
    <path d="M50,18 C54,18 56,16 58,18 C56,20 54,20 50,18Z"/>
