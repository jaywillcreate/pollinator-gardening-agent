  <circle cx="53" cy="48" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="47" y1="52" x2="26" y2="34" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="52" x2="22" y2="56" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="52" x2="36" y2="76" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="53" y1="48" x2="74" y2="32" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
