  </g>
  <!-- Rounded dense canopy outline -->
  <path d="M50,10 C64,10 76,16 84,26 C90,34 92,44 90,54 C90,64 86,74 78,80 C70,86 60,88 50,88 C40,88 30,86 22,80 C14,74 10,64 10,54 C8,44 10,34 16,26 C24,16 36,10 50,10Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
