    <path d="M18,24 C15,20 12,18 14,16 C16,16 18,18 18,20 C18,18 20,16 22,16 C24,18 21,20 18,24Z"/>
    <path d="M18,24 C14,24 12,22 10,24 C12,26 14,26 18,24Z"/>
