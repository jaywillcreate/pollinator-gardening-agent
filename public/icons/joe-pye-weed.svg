    <!-- Outer ring of radiating floret clusters -->
    <path d="M50,50 C46,40 40,28 34,20" stroke-width="1.1"/>
    <path d="M50,50 C54,40 60,28 66,20" stroke-width="1.1"/>
    <path d="M50,50 C40,46 28,40 20,34" stroke-width="1.1"/>
    <path d="M50,50 C60,46 72,40 80,34" stroke-width="1.1"/>
    <path d="M50,50 C40,54 28,60 20,66" stroke-width="1.1"/>
    <path d="M50,50 C60,54 72,60 80,66" stroke-width="1.1"/>
    <path d="M50,50 C46,60 40,72 34,80" stroke-width="1.1"/>
    <path d="M50,50 C54,60 60,72 66,80" stroke-width="1.1"/>
    <path d="M50,50 C50,40 50,28 50,18" stroke-width="1.2"/>
    <path d="M50,50 C50,60 50,72 50,82" stroke-width="1.2"/>
    <path d="M50,50 C40,50 28,50 18,50" stroke-width="1.2"/>
    <path d="M50,50 C60,50 72,50 82,50" stroke-width="1.2"/>
