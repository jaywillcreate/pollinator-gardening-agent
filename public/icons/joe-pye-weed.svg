    <ellipse cx="50" cy="50" rx="20" ry="20" stroke-width="1.3"/>
    <!-- Whorled leaf tips peeking from below -->
    <path d="M50,50 C38,58 22,74 14,86" stroke-width="1.8"/>
    <path d="M50,50 C62,58 78,74 86,86" stroke-width="1.8"/>
    <path d="M50,50 C38,42 22,26 14,14" stroke-width="1.8"/>
    <path d="M50,50 C62,42 78,26 86,14" stroke-width="1.8"/>
  </g>
  <!-- Stippling for fuzzy floret dome -->
  <g fill="#2d3a2e" stroke="none">
