<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Little Bluestem - Front View: Upright fountain-like grass clump -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Ground line -->
    <path d="M25 88 Q50 90 75 88" stroke-width="1.5"/>
    <!-- Central upright blades -->
    <path d="M50 88 Q49 55 48 15" stroke-width="1.5"/>
    <path d="M50 88 Q51 58 53 18" stroke-width="1.4"/>
    <path d="M48 88 Q46 60 44 20" stroke-width="1.3"/>
    <path d="M52 88 Q54 58 56 22" stroke-width="1.3"/>
    <!-- Outer arching blades -->
    <path d="M46 88 Q40 55 30 18" stroke-width="1.2"/>
    <path d="M54 88 Q60 52 70 16" stroke-width="1.2"/>
    <path d="M44 88 Q36 58 25 25" stroke-width="1.1"/>
    <path d="M56 88 Q64 56 75 22" stroke-width="1.1"/>
    <path d="M42 88 Q33 62 20 35" stroke-width="1.0"/>
    <path d="M58 88 Q67 60 80 32" stroke-width="1.0"/>
    <!-- Wispy outer blades -->
    <path d="M40 88 Q30 65 18 42" stroke-width="1.0"/>
    <path d="M60 88 Q70 63 82 40" stroke-width="1.0"/>
    <!-- Bronze tips (thinner at tips) -->
    <path d="M48 20 L47 10" stroke-width="1.0"/>
    <path d="M53 22 L54 12" stroke-width="1.0"/>
    <path d="M30 22 L27 14" stroke-width="1.0"/>
    <path d="M70 20 L73 12" stroke-width="1.0"/>
  </g>
  <!-- Stippling at base for density -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="48" cy="85" r="0.7"/><circle cx="52" cy="84" r="0.7"/><circle cx="50" cy="86" r="0.7"/>
    <circle cx="46" cy="84" r="0.7"/><circle cx="54" cy="85" r="0.7"/><circle cx="49" cy="82" r="0.7"/>
    <circle cx="51" cy="83" r="0.7"/><circle cx="47" cy="87" r="0.7"/><circle cx="53" cy="87" r="0.7"/>
    <circle cx="45" cy="86" r="0.7"/><circle cx="55" cy="86" r="0.7"/>
  </g>
</svg>