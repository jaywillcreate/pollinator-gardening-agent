<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Penstemon - Front View: spike of tubular bell-shaped flowers, opposite basal leaves -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,75 50,60 50,30" stroke-width="2.2"/>
    <!-- Opposite basal leaves -->
    <path d="M50,82 C42,78 30,76 20,78" stroke-width="2.0"/>
    <path d="M50,82 C58,78 70,76 80,78" stroke-width="2.0"/>
    <path d="M50,76 C44,72 34,70 26,72" stroke-width="1.8"/>
    <path d="M50,76 C56,72 66,70 74,72" stroke-width="1.8"/>
    <!-- Leaf tips -->
    <path d="M18,78 C18,76 20,76 22,78" stroke-width="1.0"/>
    <path d="M78,78 C80,76 82,76 82,78" stroke-width="1.0"/>
    <path d="M24,72 C24,70 26,70 28,72" stroke-width="1.0"/>
    <path d="M72,72 C74,70 76,70 76,72" stroke-width="1.0"/>
    <!-- Tubular flowers along the spike - left side -->
    <path d="M50,62 C46,60 40,58 36,60" stroke-width="1.4"/>
    <path d="M36,60 C34,62 34,64 36,65" stroke-width="1.4"/>
    <path d="M36,60 C34,58 34,56 36,55" stroke-width="1.4"/>
    <path d="M36,65 C38,66 40,65 40,63" stroke-width="1.0"/>
    <path d="M36,55 C38,54 40,55 40,57" stroke-width="1.0"/>
    <!-- Flower 2 - right side -->
    <path d="M50,54 C54,52 60,50 64,52" stroke-width="1.4"/>
    <path d="M64,52 C66,54 66,56 64,57" stroke-width="1.4"/>
    <path d="M64,52 C66,50 66,48 64,47" stroke-width="1.4"/>
    <path d="M64,57 C62,58 60,57 60,55" stroke-width="1.0"/>
    <path d="M64,47 C62,46 60,47 60,49" stroke-width="1.0"/>
    <!-- Flower 3 - left side -->
    <path d="M50,46 C46,44 40,42 36,44" stroke-width="1.4"/>
    <path d="M36,44 C34,46 34,48 36,49" stroke-width="1.4"/>
    <path d="M36,44 C34,42 34,40 36,39" stroke-width="1.4"/>
    <path d="M36,49 C38,50 40,49 40,47" stroke-width="1.0"/>
    <path d="M36,39 C38,38 40,39 40,41" stroke-width="1.0"/>
    <!-- Flower 4 - right side -->
    <path d="M50,38 C54,36 58,34 62,36" stroke-width="1.2"/>
    <path d="M62,36 C64,38 64,40 62,41" stroke-width="1.2"/>
    <path d="M62,36 C64,34 64,32 62,31" stroke-width="1.2"/>
    <path d="M62,41 C60,42 58,41 58,39" stroke-width="1.0"/>
    <path d="M62,31 C60,30 58,31 58,33" stroke-width="1.0"/>
    <!-- Flower 5 - top, smaller -->
    <path d="M50,32 C46,30 42,28 40,30" stroke-width="1.2"/>
    <path d="M40,30 C38,32 38,34 40,35" stroke-width="1.2"/>
    <path d="M40,30 C38,28 38,26 40,25" stroke-width="1.2"/>
    <!-- Tiny bud at top -->
    <path d="M50,30 C48,26 48,22 50,20" stroke-width="1.0"/>
    <path d="M50,30 C52,26 52,22 50,20" stroke-width="1.0"/>
    <!-- Small stem leaves -->
    <path d="M50,68 C46,66 42,67 40,70" stroke-width="1.4"/>
    <path d="M50,68 C54,66 58,67 60,70" stroke-width="1.4"/>
  </g>
  <!-- Stippling for shadow -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="46" cy="80" r="0.7"/><circle cx="54" cy="80" r="0.7"/>
    <circle cx="38" cy="62" r="0.7"/><circle cx="38" cy="64" r="0.7"/>
    <circle cx="62" cy="54" r="0.7"/><circle cx="62" cy="56" r="0.7"/>
    <circle cx="38" cy="46" r="0.7"/><circle cx="38" cy="48" r="0.7"/>
    <circle cx="60" cy="38" r="0.7"/><circle cx="60" cy="40" r="0.7"/>
    <circle cx="42" cy="32" r="0.7"/><circle cx="42" cy="30" r="0.7"/>
    <circle cx="48" cy="24" r="0.7"/><circle cx="44" cy="74" r="0.7"/>
    <circle cx="56" cy="74" r="0.7"/><circle cx="30" cy="76" r="0.7"/>
    <circle cx="70" cy="76" r="0.7"/><circle cx="42" cy="68" r="0.7"/>
    <circle cx="58" cy="68" r="0.7"/><circle cx="50" cy="84" r="0.7"/>
  </g>
