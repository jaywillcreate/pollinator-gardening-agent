<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Joe Pye Weed front-view: very tall plant with whorled leaves and dome flower cluster -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main tall stem -->
    <path d="M50,85 C50,70 50,40 50,14" stroke-width="2.5"/>
    <!-- Large dome flower cluster at top -->
    <path d="M50,14 C42,10 32,6 26,4" stroke-width="1.2"/>
    <path d="M50,14 C58,10 68,6 74,4" stroke-width="1.2"/>
    <path d="M50,14 C46,8 40,4 36,2" stroke-width="1.1"/>
    <path d="M50,14 C54,8 60,4 64,2" stroke-width="1.1"/>
    <path d="M50,14 C50,8 50,4 50,2" stroke-width="1.2"/>
    <path d="M50,14 C44,10 36,8 30,8" stroke-width="1.3"/>
    <path d="M50,14 C56,10 64,8 70,8" stroke-width="1.3"/>
    <!-- Dome outline -->
    <path d="M26,10 C30,4 40,1 50,1 C60,1 70,4 74,10" stroke-width="1.0"/>
    <path d="M30,12 C36,6 44,3 50,3 C56,3 64,6 70,12" stroke-width="1.0"/>
    <!-- Whorled leaves - top whorl -->
