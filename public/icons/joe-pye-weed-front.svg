    <path d="M50,42 C58,38 72,34 80,36" stroke-width="1.7"/>
    <path d="M50,42 C44,40 32,40 24,44" stroke-width="1.6"/>
    <path d="M50,42 C56,40 68,40 76,44" stroke-width="1.6"/>
    <!-- Whorled leaves - lower whorl -->
    <path d="M50,60 C42,56 26,52 16,54" stroke-width="2.0"/>
    <path d="M50,60 C58,56 74,52 84,54" stroke-width="2.0"/>
    <path d="M50,60 C44,58 30,58 20,62" stroke-width="1.9"/>
    <path d="M50,60 C56,58 70,58 80,62" stroke-width="1.9"/>
