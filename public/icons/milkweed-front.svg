<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Common Milkweed (Asclepias syriaca) - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Thick stem -->
    <path d="M50,85 L50,22" stroke-width="2.5"/>
    <!-- Lower pair of large broad opposite leaves -->
    <path d="M50,75 C38,68 24,64 16,68" stroke-width="2.2"/>
    <path d="M16,68 C20,64 22,60 20,56" stroke-width="1.5"/>
    <path d="M50,75 C36,72 26,70 20,64" stroke-width="1.2"/>
    <path d="M50,75 C62,68 76,64 84,68" stroke-width="2.2"/>
    <path d="M84,68 C80,64 78,60 80,56" stroke-width="1.5"/>
    <path d="M50,75 C64,72 74,70 80,64" stroke-width="1.2"/>
    <!-- Upper pair of broad opposite leaves -->
    <path d="M50,55 C40,50 30,48 22,51" stroke-width="1.8"/>
    <path d="M22,51 C25,47 26,44 24,41" stroke-width="1.2"/>
    <path d="M50,55 C40,53 32,52 26,48" stroke-width="1.0"/>
    <path d="M50,55 C60,50 70,48 78,51" stroke-width="1.8"/>
    <path d="M78,51 C75,47 74,44 76,41" stroke-width="1.2"/>
    <path d="M50,55 C60,53 68,52 74,48" stroke-width="1.0"/>
    <!-- Rounded drooping umbel flower cluster -->
    <path d="M42,22 C36,18 32,14 30,10" stroke-width="1.3"/>
    <path d="M30,10 C32,8 34,7 36,8" stroke-width="1.0"/>
    <path d="M46,22 C44,16 42,12 40,8" stroke-width="1.3"/>
    <path d="M40,8 C40,5 41,4 42,4" stroke-width="1.0"/>
    <path d="M50,22 C50,16 50,12 50,7" stroke-width="1.4"/>
    <path d="M50,7 C50,4 51,3 52,3" stroke-width="1.0"/>
    <path d="M54,22 C56,16 58,12 60,8" stroke-width="1.3"/>
    <path d="M60,8 C60,5 59,4 58,4" stroke-width="1.0"/>
    <path d="M58,22 C64,18 68,14 70,10" stroke-width="1.3"/>
    <path d="M70,10 C68,8 66,7 64,8" stroke-width="1.0"/>
    <!-- Umbel base ring -->
    <ellipse cx="50" cy="23" rx="10" ry="3" stroke-width="1.5"/>
    <!-- Drooping side florets -->
    <path d="M40,24 C36,26 32,28 29,29" stroke-width="1.1"/>
    <path d="M60,24 C64,26 68,28 71,29" stroke-width="1.1"/>
    <!-- Seed pod on side -->
    <path d="M50,65 C56,62 62,60 66,62" stroke-width="1.4"/>
    <path d="M66,62 C72,58 76,52 78,46" stroke-width="1.6"/>
    <path d="M78,46 C76,50 72,54 68,58" stroke-width="1.0"/>
    <path d="M66,62 C70,56 72,50 72,46" stroke-width="1.2"/>
  </g>
  <!-- Stippling for umbel shadow and leaf shadows -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="47" cy="23" r="0.7"/><circle cx="49" cy="23" r="0.7"/>
    <circle cx="51" cy="23" r="0.7"/><circle cx="53" cy="23" r="0.7"/>
    <circle cx="48" cy="25" r="0.7"/><circle cx="50" cy="25" r="0.7"/>
    <circle cx="52" cy="25" r="0.7"/>
    <!-- Stem shadow -->
    <circle cx="51" cy="35" r="0.7"/><circle cx="51" cy="45" r="0.7"/>
    <circle cx="51" cy="60" r="0.7"/><circle cx="51" cy="70" r="0.7"/>
    <circle cx="51" cy="80" r="0.7"/>
    <!-- Leaf shadows -->
    <circle cx="30" cy="66" r="0.7"/><circle cx="70" cy="66" r="0.7"/>
    <circle cx="34" cy="50" r="0.7"/><circle cx="66" cy="50" r="0.7"/>
    <!-- Seed pod shadow -->
    <circle cx="72" cy="50" r="0.7"/><circle cx="74" cy="48" r="0.7"/>
    <circle cx="70" cy="54" r="0.7"/>
  </g>
</svg>