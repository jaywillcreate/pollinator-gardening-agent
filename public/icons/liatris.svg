<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blazing Star top-view: spike viewed from above, star-like radiating bracts -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Central spike dot -->
    <circle cx="50" cy="50" r="3" stroke-width="2.0"/>
    <!-- Inner radiating spiky bracts -->
    <path d="M50,50 C50,46 50,40 50,32" stroke-width="1.8"/>
    <path d="M50,50 C54,46 58,40 62,34" stroke-width="1.7"/>
    <path d="M50,50 C56,50 62,50 68,50" stroke-width="1.8"/>
    <path d="M50,50 C54,54 58,60 62,66" stroke-width="1.7"/>
    <path d="M50,50 C50,54 50,60 50,68" stroke-width="1.8"/>
    <path d="M50,50 C46,54 42,60 38,66" stroke-width="1.7"/>
    <path d="M50,50 C44,50 38,50 32,50" stroke-width="1.8"/>
    <path d="M50,50 C46,46 42,40 38,34" stroke-width="1.7"/>
    <!-- Outer longer spiky bracts (between inner ones) -->
    <path d="M50,50 C52,44 54,34 56,24" stroke-width="1.2"/>
    <path d="M50,50 C56,48 66,44 76,42" stroke-width="1.2"/>
    <path d="M50,50 C56,52 66,56 76,58" stroke-width="1.2"/>
    <path d="M50,50 C52,56 54,66 56,76" stroke-width="1.2"/>
    <path d="M50,50 C48,56 46,66 44,76" stroke-width="1.2"/>
    <path d="M50,50 C44,52 34,56 24,58" stroke-width="1.2"/>
    <path d="M50,50 C44,48 34,44 24,42" stroke-width="1.2"/>
    <path d="M50,50 C48,44 46,34 44,24" stroke-width="1.2"/>
    <!-- Fluffy floret tufts radiating from center -->
    <path d="M50,36 C48,34 46,30 48,28" stroke-width="1.0"/>
    <path d="M50,36 C52,34 54,30 52,28" stroke-width="1.0"/>
    <path d="M64,50 C66,48 70,46 72,48" stroke-width="1.0"/>
    <path d="M64,50 C66,52 70,54 72,52" stroke-width="1.0"/>
    <path d="M50,64 C48,66 46,70 48,72" stroke-width="1.0"/>
    <path d="M50,64 C52,66 54,70 52,72" stroke-width="1.0"/>
    <path d="M36,50 C34,48 30,46 28,48" stroke-width="1.0"/>
    <path d="M36,50 C34,52 30,54 28,52" stroke-width="1.0"/>
  </g>
  <!-- Stippling for fluffy texture -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="50" cy="28" r="0.7"/><circle cx="48" cy="30" r="0.7"/>
    <circle cx="52" cy="30" r="0.7"/><circle cx="60" cy="36" r="0.7"/>
    <circle cx="64" cy="38" r="0.7"/><circle cx="70" cy="48" r="0.7"/>
    <circle cx="70" cy="52" r="0.7"/><circle cx="64" cy="62" r="0.7"/>
    <circle cx="60" cy="64" r="0.7"/><circle cx="52" cy="70" r="0.7"/>
    <circle cx="48" cy="70" r="0.7"/><circle cx="40" cy="64" r="0.7"/>
    <circle cx="36" cy="62" r="0.7"/><circle cx="30" cy="52" r="0.7"/>
    <circle cx="30" cy="48" r="0.7"/><circle cx="36" cy="38" r="0.7"/>
    <circle cx="40" cy="36" r="0.7"/><circle cx="46" cy="44" r="0.7"/>
    <circle cx="54" cy="44" r="0.7"/><circle cx="56" cy="50" r="0.7"/>
    <circle cx="54" cy="56" r="0.7"/><circle cx="46" cy="56" r="0.7"/>
    <circle cx="44" cy="50" r="0.7"/><circle cx="50" cy="42" r="0.7"/>
    <circle cx="56" cy="44" r="0.7"/><circle cx="44" cy="56" r="0.7"/>
  </g>
</svg>