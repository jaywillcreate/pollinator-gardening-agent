<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- House - Top View: House footprint with offset garage -->
  <!-- Main house body -->
  <rect x="15" y="20" width="45" height="55" fill="#d4d4d4" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Roof ridge line -->
  <line x1="15" y1="47" x2="60" y2="47" stroke="#4a4a4a" stroke-width="1.0" stroke-dasharray="4,2"/>
  <!-- Interior wall lines -->
  <line x1="38" y1="20" x2="38" y2="47" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="38" y1="55" x2="38" y2="75" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="15" y1="55" x2="38" y2="55" stroke="#4a4a4a" stroke-width="0.8"/>
  <!-- Garage - offset rectangle -->
  <rect x="60" y="35" width="25" height="30" fill="#f5f5f0" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Garage door indicator -->
  <line x1="65" y1="65" x2="80" y2="65" stroke="#4a4a4a" stroke-width="2.0"/>
  <!-- Front door -->
  <rect x="34" y="73" width="8" height="2" fill="#4a4a4a" stroke="none"/>
  <!-- Connecting wall -->
  <line x1="60" y1="35" x2="60" y2="65" stroke="#4a4a4a" stroke-width="1.5"/>
</svg>