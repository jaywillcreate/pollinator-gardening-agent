  <circle cx="54" cy="48" r="1.8" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="54" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Branches from stem 1 -->
