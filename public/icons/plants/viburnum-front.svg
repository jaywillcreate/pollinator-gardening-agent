<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Viburnum front-view: rounded shrub, opposite leaves, prominent flat-topped flower clusters -->
  <!-- Multiple stems from base -->
  <path d="M40,95 C38,84 36,74 34,64 C32,56 30,50 28,44" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M48,95 C48,82 46,70 44,60 C42,52 40,44 38,36" fill="none" stroke="#2d3a2e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M52,95 C52,82 54,70 56,60 C58,52 60,44 62,36" fill="none" stroke="#2d3a2e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M60,95 C62,84 64,74 66,64 C68,56 70,50 72,44" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Branches -->
  <path d="M28,44 C24,38 18,30 14,26" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M28,44 C22,42 16,40 12,38" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M38,36 C34,28 28,20 24,16" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M38,36 C36,30 32,24 30,20" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M62,36 C66,28 72,20 76,16" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M62,36 C64,30 68,24 70,20" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M72,44 C76,38 82,30 86,26" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M72,44 C78,42 84,40 88,38" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M50,46 C50,38 50,28 50,18" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M50,28 C46,22 42,16 40,12" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M50,28 C54,22 58,16 60,12" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Opposite leaf pairs along branches -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <!-- Left pair -->
    <path d="M20,36 C16,34 14,36 16,40 C18,40 20,38 20,36Z"/>
    <path d="M22,40 C20,44 22,46 24,44 C24,42 24,40 22,40Z"/>
    <!-- Inner-left pair -->
    <path d="M34,26 C30,24 28,26 30,30 C32,30 34,28 34,26Z"/>
    <path d="M36,30 C34,34 36,36 38,34 C38,32 38,30 36,30Z"/>
    <!-- Inner-right pair -->
    <path d="M66,26 C70,24 72,26 70,30 C68,30 66,28 66,26Z"/>
    <path d="M64,30 C66,34 64,36 62,34 C62,32 62,30 64,30Z"/>
    <!-- Right pair -->
    <path d="M80,36 C84,34 86,36 84,40 C82,40 80,38 80,36Z"/>
    <path d="M78,40 C80,44 78,46 76,44 C76,42 76,40 78,40Z"/>
  </g>
  <!-- Prominent flat-topped flower clusters at branch tips -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.7" stroke-linecap="round">
    <!-- Far left cluster -->
    <circle cx="12" cy="24" r="4"/>
    <circle cx="10" cy="22" r="1.5"/><circle cx="14" cy="22" r="1.5"/><circle cx="12" cy="26" r="1.5"/><circle cx="9" cy="25" r="1.2"/><circle cx="15" cy="25" r="1.2"/>
    <!-- Inner left cluster -->
    <circle cx="24" cy="14" r="4"/>
    <circle cx="22" cy="12" r="1.5"/><circle cx="26" cy="12" r="1.5"/><circle cx="24" cy="16" r="1.5"/><circle cx="21" cy="15" r="1.2"/><circle cx="27" cy="15" r="1.2"/>
    <!-- Center left cluster -->
    <circle cx="40" cy="10" r="3.5"/>
    <circle cx="38" cy="8" r="1.3"/><circle cx="42" cy="8" r="1.3"/><circle cx="40" cy="12" r="1.3"/>
    <!-- Top center cluster -->
    <circle cx="50" cy="14" r="3.5"/>
    <circle cx="48" cy="12" r="1.3"/><circle cx="52" cy="12" r="1.3"/><circle cx="50" cy="16" r="1.3"/>
    <!-- Center right cluster -->
    <circle cx="60" cy="10" r="3.5"/>
    <circle cx="58" cy="8" r="1.3"/><circle cx="62" cy="8" r="1.3"/><circle cx="60" cy="12" r="1.3"/>
    <!-- Inner right cluster -->
    <circle cx="76" cy="14" r="4"/>
    <circle cx="74" cy="12" r="1.5"/><circle cx="78" cy="12" r="1.5"/><circle cx="76" cy="16" r="1.5"/><circle cx="73" cy="15" r="1.2"/><circle cx="79" cy="15" r="1.2"/>
    <!-- Far right cluster -->
    <circle cx="88" cy="24" r="4"/>
    <circle cx="86" cy="22" r="1.5"/><circle cx="90" cy="22" r="1.5"/><circle cx="88" cy="26" r="1.5"/><circle cx="85" cy="25" r="1.2"/><circle cx="91" cy="25" r="1.2"/>
  </g>
  <!-- Rounded shrub canopy outline -->
  <path d="M6,40 C4,32 8,22 14,16 C22,10 32,6 42,6 C46,4 50,4 50,4 C50,4 54,4 58,6 C68,6 78,10 86,16 C92,22 96,32 94,40 C92,48 86,54 76,56 C66,58 58,60 50,60 C42,60 34,58 24,56 C14,54 8,48 6,40Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stippling -->
  <circle cx="16" cy="32" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="84" cy="32" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="34" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="66" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="8" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="30" cy="46" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="70" cy="46" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="40" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="42" cy="50" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="58" cy="50" r="0.7" fill="#2d3a2e" stroke="none"/>
</svg>