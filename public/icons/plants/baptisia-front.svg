<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wild Indigo / Baptisia - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stems from base creating bushy rounded mound -->
    <path d="M50,85 C50,70 50,55 50,30" stroke-width="2.2"/>
    <path d="M48,85 C44,68 38,52 30,40" stroke-width="2.0"/>
    <path d="M52,85 C56,68 62,52 70,40" stroke-width="2.0"/>
    <!-- Outer arching stems -->
    <path d="M46,85 C38,70 28,58 18,50" stroke-width="1.8"/>
    <path d="M54,85 C62,70 72,58 82,50" stroke-width="1.8"/>
    <!-- Trifoliate leaves along central stem -->
    <!-- Upper leaves -->
    <path d="M50,38 C46,34 42,32 40,34" stroke-width="1.3"/>
    <path d="M50,38 C54,34 58,32 60,34" stroke-width="1.3"/>
    <path d="M50,38 C50,34 50,32 50,30" stroke-width="1.2"/>
    <!-- Mid leaves -->
    <path d="M50,50 C44,46 38,44 36,46" stroke-width="1.4"/>
    <path d="M50,50 C56,46 62,44 64,46" stroke-width="1.4"/>
    <path d="M50,50 C50,46 50,44 50,42" stroke-width="1.2"/>
    <!-- Trifoliate leaves on left branch -->
    <path d="M34,46 C30,42 26,40 24,42" stroke-width="1.2"/>
    <path d="M34,46 C32,42 30,38 28,38" stroke-width="1.2"/>
    <path d="M34,46 C36,42 38,40 38,38" stroke-width="1.2"/>
    <!-- Trifoliate leaves on right branch -->
    <path d="M66,46 C70,42 74,40 76,42" stroke-width="1.2"/>
    <path d="M66,46 C68,42 70,38 72,38" stroke-width="1.2"/>
    <path d="M66,46 C64,42 62,40 62,38" stroke-width="1.2"/>
    <!-- Trifoliate leaves on outer left -->
    <path d="M24,54 C20,50 16,48 14,50" stroke-width="1.1"/>
    <path d="M24,54 C22,50 20,46 18,46" stroke-width="1.1"/>
    <path d="M24,54 C26,50 28,48 28,46" stroke-width="1.1"/>
    <!-- Trifoliate leaves on outer right -->
    <path d="M76,54 C80,50 84,48 86,50" stroke-width="1.1"/>
    <path d="M76,54 C78,50 80,46 82,46" stroke-width="1.1"/>
    <path d="M76,54 C74,50 72,48 72,46" stroke-width="1.1"/>
    <!-- Lower trifoliate leaves on branches -->
    <path d="M38,62 C34,58 30,56 28,58" stroke-width="1.4"/>
    <path d="M38,62 C36,58 34,54 32,54" stroke-width="1.2"/>
    <path d="M38,62 C40,58 42,56 42,54" stroke-width="1.2"/>
    <path d="M62,62 C66,58 70,56 72,58" stroke-width="1.4"/>
    <path d="M62,62 C64,58 66,54 68,54" stroke-width="1.2"/>
    <path d="M62,62 C60,58 58,56 58,54" stroke-width="1.2"/>
    <!-- Upright flower spikes -->
    <!-- Central spike -->
    <path d="M50,30 C50,24 50,18 50,10" stroke-width="1.4"/>
    <!-- Pea-like flower buds along spike -->
    <ellipse cx="50" cy="14" rx="2.5" ry="1.5" stroke-width="1.0"/>
    <ellipse cx="50" cy="18" rx="2.5" ry="1.5" stroke-width="1.0"/>
    <ellipse cx="50" cy="22" rx="2.5" ry="1.5" stroke-width="1.0"/>
    <ellipse cx="50" cy="26" rx="2.2" ry="1.3" stroke-width="1.0"/>
    <circle cx="50" cy="10" r="1.5" stroke-width="1.0"/>
    <!-- Left spike -->
    <path d="M34,40 C32,34 30,28 28,22" stroke-width="1.2"/>
    <ellipse cx="29" cy="26" rx="2" ry="1.3" stroke-width="1.0"/>
    <ellipse cx="28.5" cy="30" rx="2" ry="1.3" stroke-width="1.0"/>
    <circle cx="28" cy="22" r="1.3" stroke-width="1.0"/>
    <!-- Right spike -->
    <path d="M66,40 C68,34 70,28 72,22" stroke-width="1.2"/>
    <ellipse cx="71" cy="26" rx="2" ry="1.3" stroke-width="1.0"/>
    <ellipse cx="71.5" cy="30" rx="2" ry="1.3" stroke-width="1.0"/>
    <circle cx="72" cy="22" r="1.3" stroke-width="1.0"/>
  </g>
  <!-- Stippling for bushy mound shadow -->
  <g fill="#2d3a2e" stroke="none">
    <!-- Base shadows -->
    <circle cx="48" cy="82" r="0.7"/><circle cx="52" cy="82" r="0.7"/>
    <circle cx="46" cy="80" r="0.7"/><circle cx="54" cy="80" r="0.7"/>
    <!-- Interior mound shadows -->
    <circle cx="42" cy="60" r="0.7"/><circle cx="58" cy="60" r="0.7"/>
    <circle cx="45" cy="55" r="0.7"/><circle cx="55" cy="55" r="0.7"/>
    <circle cx="50" cy="58" r="0.7"/><circle cx="50" cy="65" r="0.7"/>
    <circle cx="36" cy="52" r="0.7"/><circle cx="64" cy="52" r="0.7"/>
    <!-- Branch junction shadows -->
    <circle cx="40" cy="68" r="0.7"/><circle cx="60" cy="68" r="0.7"/>
    <circle cx="34" cy="62" r="0.7"/><circle cx="66" cy="62" r="0.7"/>
    <!-- Spike shadows -->
    <circle cx="50" cy="16" r="0.7"/><circle cx="50" cy="20" r="0.7"/>
    <circle cx="29" cy="28" r="0.7"/><circle cx="71" cy="28" r="0.7"/>
  </g>
</svg>