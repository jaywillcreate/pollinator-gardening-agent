<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Spiderwort - Front View: clumping plant with arching grass-like leaves and 3-petaled flowers -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Arching grass-like leaves from base -->
    <path d="M50,85 C44,72 30,54 16,42" stroke-width="2.2"/>
    <path d="M50,85 C42,70 26,56 12,50" stroke-width="2.0"/>
    <path d="M50,85 C56,72 70,54 84,42" stroke-width="2.2"/>
    <path d="M50,85 C58,70 74,56 88,50" stroke-width="2.0"/>
    <path d="M50,85 C46,68 34,50 22,38" stroke-width="1.8"/>
    <path d="M50,85 C54,68 66,50 78,38" stroke-width="1.8"/>
    <path d="M50,85 C48,74 44,60 40,48" stroke-width="1.6"/>
    <path d="M50,85 C52,74 56,60 60,48" stroke-width="1.6"/>
    <!-- Tall flower stems rising above leaves -->
    <path d="M50,85 C48,70 46,55 44,40" stroke-width="1.8"/>
    <path d="M44,40 C42,34 40,28 38,24" stroke-width="1.4"/>
    <path d="M50,85 C52,68 56,52 58,38" stroke-width="1.6"/>
    <path d="M58,38 C60,32 62,26 64,22" stroke-width="1.2"/>
    <!-- Three-petaled flower 1 (main) -->
    <!-- Petal top -->
    <path d="M38,24 C34,20 32,14 36,12 C38,10 40,12 42,14 C44,18 42,22 38,24" stroke-width="1.4"/>
    <!-- Petal bottom-left -->
    <path d="M38,24 C32,26 28,30 30,32 C32,34 34,32 36,30 C38,28 38,26 38,24" stroke-width="1.4"/>
    <!-- Petal bottom-right -->
    <path d="M38,24 C44,26 48,30 46,32 C44,34 42,32 40,30 C38,28 38,26 38,24" stroke-width="1.4"/>
    <!-- Center -->
    <circle cx="38" cy="24" r="1.8" stroke-width="1.0"/>
    <!-- Stamen hairs -->
    <path d="M38,22 L38,18" stroke-width="0.8"/>
    <path d="M36,25 L33,27" stroke-width="0.8"/>
    <path d="M40,25 L43,27" stroke-width="0.8"/>
    <!-- Three-petaled flower 2 (right, smaller) -->
    <path d="M64,22 C60,18 58,14 62,12 C64,10 66,12 68,16 C68,18 66,20 64,22" stroke-width="1.2"/>
    <path d="M64,22 C60,24 58,28 60,28 C62,30 64,28 64,26" stroke-width="1.2"/>
    <path d="M64,22 C68,24 72,28 70,28 C68,30 66,28 64,26" stroke-width="1.2"/>
    <circle cx="64" cy="22" r="1.5" stroke-width="1.0"/>
    <!-- Flower bud -->
    <path d="M44,40 C46,36 44,32 42,30" stroke-width="1.0"/>
    <path d="M42,30 C40,30 40,32 42,32" stroke-width="1.0"/>
    <path d="M42,30 C44,30 44,32 42,32" stroke-width="1.0"/>
  </g>
  <!-- Stippling for shadow -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="46" cy="76" r="0.7"/><circle cx="54" cy="76" r="0.7"/>
    <circle cx="42" cy="68" r="0.7"/><circle cx="58" cy="68" r="0.7"/>
