    <circle cx="40" cy="20" r="0.7"/><circle cx="34" cy="28" r="0.7"/>
    <circle cx="42" cy="28" r="0.7"/><circle cx="62" cy="18" r="0.7"/>
    <circle cx="66" cy="18" r="0.7"/><circle cx="44" cy="56" r="0.7"/>
    <circle cx="56" cy="56" r="0.7"/><circle cx="20" cy="44" r="0.7"/>
