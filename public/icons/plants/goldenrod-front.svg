    <path d="M50,60 C58,58 66,56 70,56" stroke-width="1.0"/>
    <path d="M50,50 C42,48 36,46 32,46" stroke-width="1.0"/>
    <path d="M50,42 C58,40 64,38 68,38" stroke-width="1.0"/>
  </g>
