<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Elderberry front-view: multi-stemmed large shrub, arching branches, flat-topped umbels -->
  <!-- Multiple stems from base -->
  <path d="M38,95 C36,85 34,75 32,65 C30,58 28,52 26,46" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M46,95 C46,82 46,70 46,58 C46,50 44,42 42,36" fill="none" stroke="#2d3a2e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M54,95 C54,82 54,70 54,58 C54,50 56,42 58,36" fill="none" stroke="#2d3a2e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M62,95 C64,85 66,75 68,65 C70,58 72,52 74,46" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <!-- Arching branches -->
  <path d="M26,46 C22,38 16,30 12,26" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M26,46 C24,40 20,36 16,34" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M42,36 C38,28 34,22 30,18" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M42,36 C40,30 36,26 32,24" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M58,36 C62,28 66,22 70,18" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M58,36 C60,30 64,26 68,24" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M74,46 C78,38 84,30 88,26" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M74,46 C76,40 80,36 84,34" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Compound pinnate leaf pairs -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <path d="M18,32 C14,30 12,32 14,36"/>
    <path d="M18,32 C22,30 24,32 22,36"/>
    <path d="M36,24 C32,22 30,24 32,28"/>
    <path d="M36,24 C40,22 42,24 40,28"/>
    <path d="M64,24 C60,22 58,24 60,28"/>
    <path d="M64,24 C68,22 70,24 68,28"/>
    <path d="M82,32 C78,30 76,32 78,36"/>
    <path d="M82,32 C86,30 88,32 86,36"/>
  </g>
  <!-- Flat-topped flower clusters (umbels) at branch tips -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.7" stroke-linecap="round">
    <!-- Left umbel -->
    <line x1="8" y1="24" x2="16" y2="24" stroke-width="0.8"/>
    <circle cx="8" cy="22" r="1.2"/><circle cx="10" cy="23" r="1.2"/><circle cx="12" cy="22" r="1.2"/><circle cx="14" cy="23" r="1.2"/><circle cx="16" cy="22" r="1.2"/>
    <!-- Center-left umbel -->
    <line x1="26" y1="16" x2="34" y2="16" stroke-width="0.8"/>
    <circle cx="26" cy="14" r="1.2"/><circle cx="28" cy="15" r="1.2"/><circle cx="30" cy="14" r="1.2"/><circle cx="32" cy="15" r="1.2"/><circle cx="34" cy="14" r="1.2"/>
    <!-- Center-right umbel -->
    <line x1="66" y1="16" x2="74" y2="16" stroke-width="0.8"/>
    <circle cx="66" cy="14" r="1.2"/><circle cx="68" cy="15" r="1.2"/><circle cx="70" cy="14" r="1.2"/><circle cx="72" cy="15" r="1.2"/><circle cx="74" cy="14" r="1.2"/>
    <!-- Right umbel -->
    <line x1="84" y1="24" x2="92" y2="24" stroke-width="0.8"/>
    <circle cx="84" cy="22" r="1.2"/><circle cx="86" cy="23" r="1.2"/><circle cx="88" cy="22" r="1.2"/><circle cx="90" cy="23" r="1.2"/><circle cx="92" cy="22" r="1.2"/>
  </g>
  <!-- Shrub canopy outline -->
  <path d="M6,28 C4,22 6,16 12,12 C20,8 30,10 38,10 C44,8 48,8 50,8 C52,8 56,8 62,10 C70,10 80,8 88,12 C94,16 96,22 94,28 C96,36 92,44 84,50 C76,56 66,60 56,62 C52,62 48,62 44,62 C34,60 24,56 16,50 C8,44 4,36 6,28Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stippling -->
  <circle cx="20" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="12" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="80" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="12" cy="40" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="88" cy="40" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="36" cy="50" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="64" cy="50" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="34" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="42" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="58" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
</svg>