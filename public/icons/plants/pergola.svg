<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pergola - Top View: Rectangular frame with parallel rafters -->
  <g fill="none" stroke="#4a4a4a" stroke-width="1.5">
    <!-- Outer frame / support beams -->
    <rect x="15" y="15" width="70" height="70"/>
    <!-- Inner frame -->
    <rect x="18" y="18" width="64" height="64"/>
    <!-- Support posts at corners (small squares) -->
    <rect x="13" y="13" width="8" height="8" stroke-width="1.5"/>
    <rect x="79" y="13" width="8" height="8" stroke-width="1.5"/>
    <rect x="13" y="79" width="8" height="8" stroke-width="1.5"/>
    <rect x="79" y="79" width="8" height="8" stroke-width="1.5"/>
    <!-- Parallel rafters (evenly spaced horizontal lines) -->
    <line x1="15" y1="26" x2="85" y2="26" stroke-width="1.2"/>
    <line x1="15" y1="35" x2="85" y2="35" stroke-width="1.2"/>
    <line x1="15" y1="44" x2="85" y2="44" stroke-width="1.2"/>
    <line x1="15" y1="53" x2="85" y2="53" stroke-width="1.2"/>
    <line x1="15" y1="62" x2="85" y2="62" stroke-width="1.2"/>
    <line x1="15" y1="71" x2="85" y2="71" stroke-width="1.2"/>
  </g>
</svg>