<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wild Ginger - Front View: Very low plant, large heart-shaped leaves close to ground -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Ground line -->
    <path d="M8 90 Q50 92 92 90" stroke-width="1.5"/>
    <!-- Left large heart-shaped leaf -->
    <path d="M30 78 Q22 74 16 78 Q12 82 16 86 Q20 90 30 88 Q36 86 38 82 Q38 78 30 78Z" stroke-width="1.5"/>
    <path d="M30 78 L28 88" stroke-width="1.0"/>
    <!-- Center leaf -->
    <path d="M50 75 Q42 72 38 76 Q34 80 38 84 Q42 88 50 86 Q58 88 62 84 Q66 80 62 76 Q58 72 50 75Z" stroke-width="1.5"/>
    <path d="M50 75 L50 86" stroke-width="1.0"/>
    <!-- Right leaf -->
    <path d="M70 78 Q64 74 60 78 Q58 82 62 86 Q66 90 74 88 Q80 86 82 82 Q80 78 70 78Z" stroke-width="1.5"/>
    <path d="M70 78 L72 88" stroke-width="1.0"/>
    <!-- Short stems from soil -->
    <path d="M28 90 Q28 84 30 78" stroke-width="1.2"/>
    <path d="M50 90 Q50 82 50 75" stroke-width="1.2"/>
    <path d="M72 90 Q72 84 70 78" stroke-width="1.2"/>
  </g>
  <!-- Stippling for leaf veins/texture -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="24" cy="82" r="0.7"/><circle cx="34" cy="82" r="0.7"/><circle cx="28" cy="84" r="0.7"/>
    <circle cx="46" cy="80" r="0.7"/><circle cx="54" cy="80" r="0.7"/><circle cx="50" cy="82" r="0.7"/>
    <circle cx="66" cy="82" r="0.7"/><circle cx="76" cy="82" r="0.7"/><circle cx="70" cy="84" r="0.7"/>
    <circle cx="20" cy="80" r="0.7"/><circle cx="80" cy="80" r="0.7"/>
  </g>
</svg>