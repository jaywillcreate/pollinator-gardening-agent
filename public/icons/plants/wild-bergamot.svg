<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wild Bergamot (Monarda fistulosa) - Top View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Square stem cross-section at center (smaller than bee-balm) -->
    <rect x="48" y="48" width="4" height="4" rx="0.3" stroke-width="1.5"/>
    <!-- Delicate tubular flowers in soft whorl - many fine tubes -->
    <!-- Inner ring of tiny tubes -->
    <path d="M50,48 C50,43 49,38 48,33" stroke-width="1.2"/>
    <path d="M52,48 C54,43 56,39 58,35" stroke-width="1.1"/>
    <path d="M52,50 C57,49 62,48 67,47" stroke-width="1.2"/>
    <path d="M52,52 C56,54 60,57 64,60" stroke-width="1.1"/>
    <path d="M50,52 C50,57 50,62 50,67" stroke-width="1.2"/>
    <path d="M48,52 C46,56 44,60 42,64" stroke-width="1.1"/>
    <path d="M48,50 C43,50 38,50 33,50" stroke-width="1.2"/>
    <path d="M48,48 C44,45 40,42 36,38" stroke-width="1.1"/>
    <!-- Outer ring - more numerous delicate tubes -->
    <path d="M49,48 C48,41 47,34 45,26" stroke-width="1.0"/>
    <path d="M51,48 C53,41 55,34 58,27" stroke-width="1.0"/>
    <path d="M52,49 C58,47 64,45 71,43" stroke-width="1.0"/>
    <path d="M52,51 C58,53 64,56 70,59" stroke-width="1.0"/>
    <path d="M51,52 C52,59 53,66 53,73" stroke-width="1.0"/>
    <path d="M49,52 C47,59 45,66 43,72" stroke-width="1.0"/>
    <path d="M48,51 C42,53 36,55 30,57" stroke-width="1.0"/>
    <path d="M48,49 C42,46 36,43 30,40" stroke-width="1.0"/>
    <!-- Extra fine tubes between main ones -->
    <path d="M50,47 C52,40 55,33 57,26" stroke-width="1.0"/>
    <path d="M53,49 C60,48 66,46 73,44" stroke-width="1.0"/>
    <path d="M53,52 C59,56 65,61 70,66" stroke-width="1.0"/>
    <path d="M50,53 C49,60 47,67 46,73" stroke-width="1.0"/>
    <path d="M47,52 C42,55 37,58 31,61" stroke-width="1.0"/>
    <path d="M47,49 C41,47 35,44 29,42" stroke-width="1.0"/>
    <path d="M47,47 C43,42 39,37 34,32" stroke-width="1.0"/>
    <path d="M53,47 C57,43 61,39 66,35" stroke-width="1.0"/>
    <!-- Delicate forked tips (smaller than bee-balm) -->
    <path d="M48,33 C47,30 46,28 44,27" stroke-width="0.8"/>
    <path d="M48,33 C49,30 50,28 51,27" stroke-width="0.8"/>
    <path d="M67,47 C70,46 72,44 74,43" stroke-width="0.8"/>
    <path d="M67,47 C70,48 72,50 74,51" stroke-width="0.8"/>
    <path d="M50,67 C49,70 48,72 47,74" stroke-width="0.8"/>
    <path d="M50,67 C51,70 52,72 53,74" stroke-width="0.8"/>
    <path d="M33,50 C30,49 28,48 26,47" stroke-width="0.8"/>
    <path d="M33,50 C30,51 28,52 26,53" stroke-width="0.8"/>
    <!-- Opposite leaves at base -->
    <path d="M34,78 C28,82 22,86 18,90" stroke-width="1.8"/>
    <path d="M66,78 C72,82 78,86 82,90" stroke-width="1.8"/>
  </g>
  <!-- Light stippling for center -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="49" cy="49" r="0.7"/><circle cx="51" cy="49" r="0.7"/>
    <circle cx="49" cy="51" r="0.7"/><circle cx="51" cy="51" r="0.7"/>
    <circle cx="50" cy="50" r="0.7"/>
  </g>
</svg>