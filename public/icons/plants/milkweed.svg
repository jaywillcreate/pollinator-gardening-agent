<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Common Milkweed (Asclepias syriaca) - Top View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Central stem dot -->
    <circle cx="50" cy="50" r="2" stroke-width="1.8"/>
    <!-- Rounded umbel - ball-shaped flower cluster from above -->
    <!-- Star-shaped florets in a dome pattern -->
    <circle cx="50" cy="50" r="12" stroke-width="1.4"/>
    <!-- Individual star florets within the umbel -->
    <!-- Center floret -->
    <path d="M50,46 L50,43" stroke-width="1.0"/>
    <path d="M54,48 L56,45" stroke-width="1.0"/>
    <path d="M54,52 L56,55" stroke-width="1.0"/>
    <path d="M50,54 L50,57" stroke-width="1.0"/>
    <path d="M46,52 L44,55" stroke-width="1.0"/>
    <path d="M46,48 L44,45" stroke-width="1.0"/>
    <!-- Ring of florets around edge -->
    <path d="M50,38 L50,35 M48,38 L47,35 M52,38 L53,35" stroke-width="1.0"/>
    <path d="M59,42 L62,40 M58,44 L61,42 M60,40 L63,38" stroke-width="1.0"/>
    <path d="M62,50 L65,50 M62,48 L65,47 M62,52 L65,53" stroke-width="1.0"/>
    <path d="M59,58 L62,60 M58,56 L61,58 M60,60 L63,62" stroke-width="1.0"/>
    <path d="M50,62 L50,65 M48,62 L47,65 M52,62 L53,65" stroke-width="1.0"/>
    <path d="M41,58 L38,60 M42,56 L39,58 M40,60 L37,62" stroke-width="1.0"/>
    <path d="M38,50 L35,50 M38,48 L35,47 M38,52 L35,53" stroke-width="1.0"/>
    <path d="M41,42 L38,40 M42,44 L39,42 M40,40 L37,38" stroke-width="1.0"/>
    <!-- Large broad opposite leaves -->
    <path d="M36,70 C26,78 18,86 14,94" stroke-width="2.4"/>
    <path d="M14,94 C20,90 24,86 22,80" stroke-width="1.6"/>
    <path d="M36,70 C30,74 26,78 22,80" stroke-width="1.2"/>
    <path d="M64,70 C74,78 82,86 86,94" stroke-width="2.4"/>
    <path d="M86,94 C80,90 76,86 78,80" stroke-width="1.6"/>
    <path d="M64,70 C70,74 74,78 78,80" stroke-width="1.2"/>
    <!-- Second pair of leaves (perpendicular) -->
    <path d="M28,38 C18,30 12,22 8,14" stroke-width="2.2"/>
    <path d="M8,14 C14,18 18,22 20,28" stroke-width="1.4"/>
    <path d="M28,38 C24,34 20,30 20,28" stroke-width="1.2"/>
    <path d="M72,38 C82,30 88,22 92,14" stroke-width="2.2"/>
    <path d="M92,14 C86,18 82,22 80,28" stroke-width="1.4"/>
    <path d="M72,38 C76,34 80,30 80,28" stroke-width="1.2"/>
  </g>
  <!-- Stippling for umbel dome shading -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="48" cy="48" r="0.7"/><circle cx="52" cy="48" r="0.7"/>
    <circle cx="48" cy="52" r="0.7"/><circle cx="52" cy="52" r="0.7"/>
    <circle cx="50" cy="50" r="0.7"/><circle cx="46" cy="50" r="0.7"/>
    <circle cx="54" cy="50" r="0.7"/><circle cx="50" cy="46" r="0.7"/>
    <circle cx="50" cy="54" r="0.7"/>
    <!-- Leaf midrib shadows -->
    <circle cx="28" cy="76" r="0.7"/><circle cx="72" cy="76" r="0.7"/>
    <circle cx="20" cy="28" r="0.7"/><circle cx="80" cy="28" r="0.7"/>
    <circle cx="24" cy="82" r="0.7"/><circle cx="76" cy="82" r="0.7"/>
  </g>
</svg>