    <path d="M20 30 L24 26" stroke-width="1.0"/><path d="M30 22 L34 18" stroke-width="1.0"/>
    <path d="M60 20 L64 16" stroke-width="1.0"/><path d="M75 28 L79 24" stroke-width="1.0"/>
    <path d="M15 50 L19 46" stroke-width="1.0"/><path d="M82 48 L86 44" stroke-width="1.0"/>
    <path d="M22 70 L26 66" stroke-width="1.0"/><path d="M72 68 L76 64" stroke-width="1.0"/>
    <path d="M40 80 L44 76" stroke-width="1.0"/><path d="M58 78 L62 74" stroke-width="1.0"/>
    <!-- 5-petaled flowers scattered across mat -->
    <!-- Flower 1 -->
    <circle cx="30" cy="35" r="5" stroke-width="1.2"/>
    <path d="M30 30 L30 32 M34 33 L32 34 M33 39 L31 38 M27 39 L28 37 M26 33 L28 34" stroke-width="1.0"/>
    <!-- Flower 2 -->
    <circle cx="50" cy="28" r="5" stroke-width="1.2"/>
    <path d="M50 23 L50 25 M54 26 L52 27 M53 32 L51 31 M47 32 L48 30 M46 26 L48 27" stroke-width="1.0"/>
    <!-- Flower 3 -->
    <circle cx="70" cy="38" r="5" stroke-width="1.2"/>
    <path d="M70 33 L70 35 M74 36 L72 37 M73 42 L71 41 M67 42 L68 40 M66 36 L68 37" stroke-width="1.0"/>
    <!-- Flower 4 -->
    <circle cx="25" cy="55" r="5" stroke-width="1.2"/>
    <path d="M25 50 L25 52 M29 53 L27 54 M28 59 L26 58 M22 59 L23 57 M21 53 L23 54" stroke-width="1.0"/>
    <!-- Flower 5 -->
    <circle cx="50" cy="50" r="5" stroke-width="1.2"/>
    <path d="M50 45 L50 47 M54 48 L52 49 M53 54 L51 53 M47 54 L48 52 M46 48 L48 49" stroke-width="1.0"/>
    <!-- Flower 6 -->
    <circle cx="75" cy="55" r="5" stroke-width="1.2"/>
    <path d="M75 50 L75 52 M79 53 L77 54 M78 59 L76 58 M72 59 L73 57 M71 53 L73 54" stroke-width="1.0"/>
    <!-- Flower 7 -->
    <circle cx="38" cy="65" r="5" stroke-width="1.2"/>
    <path d="M38 60 L38 62 M42 63 L40 64 M41 69 L39 68 M35 69 L36 67 M34 63 L36 64" stroke-width="1.0"/>
    <!-- Flower 8 -->
    <circle cx="62" cy="65" r="5" stroke-width="1.2"/>
    <path d="M62 60 L62 62 M66 63 L64 64 M65 69 L63 68 M59 69 L60 67 M58 63 L60 64" stroke-width="1.0"/>
    <!-- Flower 9 -->
    <circle cx="50" cy="78" r="5" stroke-width="1.2"/>
    <path d="M50 73 L50 75 M54 76 L52 77 M53 82 L51 81 M47 82 L48 80 M46 76 L48 77" stroke-width="1.0"/>
  </g>
  <!-- Stippling for flower centers -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="30" cy="35" r="0.7"/><circle cx="50" cy="28" r="0.7"/><circle cx="70" cy="38" r="0.7"/>
    <circle cx="25" cy="55" r="0.7"/><circle cx="50" cy="50" r="0.7"/><circle cx="75" cy="55" r="0.7"/>
    <circle cx="38" cy="65" r="0.7"/><circle cx="62" cy="65" r="0.7"/><circle cx="50" cy="78" r="0.7"/>
  </g>
</svg>