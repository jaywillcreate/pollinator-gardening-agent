<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Creeping Phlox - Top View: Dense mat of tiny 5-petaled flowers over needle-like foliage -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
