<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- New England Aster - Top View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Dense ray petals (20+) radiating from small center - tight, numerous -->
    <!-- Ring 1: 0-90 degrees -->
    <path d="M50,50 C50,44 50,38 50,28" stroke-width="1.3"/>
    <path d="M50,50 C52,44 54,38 56,29" stroke-width="1.2"/>
    <path d="M50,50 C54,44 58,38 62,30" stroke-width="1.3"/>
    <path d="M50,50 C56,45 62,40 68,34" stroke-width="1.2"/>
    <path d="M50,50 C58,46 66,42 74,38" stroke-width="1.3"/>
    <!-- Ring 2: 90-180 degrees -->
    <path d="M50,50 C58,48 66,46 76,44" stroke-width="1.2"/>
    <path d="M50,50 C58,50 66,50 76,50" stroke-width="1.3"/>
    <path d="M50,50 C58,52 66,54 76,56" stroke-width="1.2"/>
    <path d="M50,50 C56,55 62,60 68,66" stroke-width="1.3"/>
    <path d="M50,50 C54,56 58,62 62,70" stroke-width="1.2"/>
    <!-- Ring 3: 180-270 degrees -->
    <path d="M50,50 C52,56 54,62 56,71" stroke-width="1.3"/>
    <path d="M50,50 C50,56 50,62 50,72" stroke-width="1.2"/>
    <path d="M50,50 C48,56 46,62 44,71" stroke-width="1.3"/>
    <path d="M50,50 C46,56 42,62 38,70" stroke-width="1.2"/>
    <path d="M50,50 C44,55 38,60 32,66" stroke-width="1.3"/>
    <!-- Ring 4: 270-360 degrees -->
    <path d="M50,50 C42,52 34,54 24,56" stroke-width="1.2"/>
    <path d="M50,50 C42,50 34,50 24,50" stroke-width="1.3"/>
    <path d="M50,50 C42,48 34,46 24,44" stroke-width="1.2"/>
    <path d="M50,50 C42,46 34,42 26,38" stroke-width="1.3"/>
    <path d="M50,50 C46,45 42,40 38,34" stroke-width="1.2"/>
    <!-- Extra petals filling gaps for dense appearance -->
    <path d="M50,50 C44,44 38,38 32,30" stroke-width="1.1"/>
    <path d="M50,50 C48,44 46,38 44,29" stroke-width="1.1"/>
    <path d="M50,50 C60,48 70,46 78,43" stroke-width="1.1"/>
    <path d="M50,50 C60,54 70,58 78,62" stroke-width="1.1"/>
    <path d="M50,50 C40,54 30,58 22,62" stroke-width="1.1"/>
    <path d="M50,50 C40,46 30,42 22,38" stroke-width="1.1"/>
    <!-- Small yellow center -->
    <circle cx="50" cy="50" r="5" stroke-width="1.6"/>
    <circle cx="50" cy="50" r="2.5" stroke-width="1.0"/>
  </g>
  <!-- Stippling for center (yellow disk) -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="49" cy="49" r="0.7"/><circle cx="51" cy="49" r="0.7"/>
    <circle cx="49" cy="51" r="0.7"/><circle cx="51" cy="51" r="0.7"/>
    <circle cx="50" cy="48" r="0.7"/><circle cx="50" cy="52" r="0.7"/>
    <circle cx="48" cy="50" r="0.7"/><circle cx="52" cy="50" r="0.7"/>
    <circle cx="50" cy="50" r="0.7"/><circle cx="47" cy="49" r="0.7"/>
    <circle cx="53" cy="49" r="0.7"/><circle cx="47" cy="51" r="0.7"/>
    <circle cx="53" cy="51" r="0.7"/>
  </g>
</svg>