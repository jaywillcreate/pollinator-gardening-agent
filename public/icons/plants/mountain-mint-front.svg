<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mountain Mint (Pycnanthemum) - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Square stem (mint family) -->
    <path d="M49,85 L49,28" stroke-width="2.2"/>
    <path d="M51,85 L51,28" stroke-width="2.2"/>
    <!-- Lower pair of opposite leaves -->
    <path d="M49,74 C40,68 30,64 22,66" stroke-width="2.0"/>
    <path d="M22,66 C26,62 27,59 25,56" stroke-width="1.3"/>
    <path d="M51,74 C60,68 70,64 78,66" stroke-width="2.0"/>
    <path d="M78,66 C74,62 73,59 75,56" stroke-width="1.3"/>
    <!-- Upper pair of opposite leaves -->
    <path d="M49,56 C42,52 34,50 28,52" stroke-width="1.7"/>
    <path d="M28,52 C31,49 32,46 30,44" stroke-width="1.1"/>
    <path d="M51,56 C58,52 66,50 72,52" stroke-width="1.7"/>
    <path d="M72,52 C69,49 68,46 70,44" stroke-width="1.1"/>
    <!-- Silvery bracts below flower cluster -->
    <path d="M44,32 C38,34 32,36 27,38" stroke-width="1.5"/>
    <path d="M27,38 C30,36 31,34 30,32" stroke-width="1.0"/>
    <path d="M56,32 C62,34 68,36 73,38" stroke-width="1.5"/>
    <path d="M73,38 C70,36 69,34 70,32" stroke-width="1.0"/>
    <!-- Dense flower cluster at top -->
    <ellipse cx="50" cy="28" rx="10" ry="4" stroke-width="1.6"/>
    <!-- Tiny florets emerging upward from cluster -->
    <path d="M44,26 C43,22 42,18 41,14" stroke-width="1.2"/>
    <path d="M41,14 C40,11 39,9 38,8" stroke-width="1.0"/>
    <path d="M47,25 C46,20 45,15 44,10" stroke-width="1.2"/>
    <path d="M44,10 C43,7 43,5 42,4" stroke-width="1.0"/>
    <path d="M50,24 C50,19 50,14 50,9" stroke-width="1.3"/>
    <path d="M50,9 C50,6 50,4 50,3" stroke-width="1.0"/>
    <path d="M53,25 C54,20 55,15 56,10" stroke-width="1.2"/>
    <path d="M56,10 C57,7 57,5 58,4" stroke-width="1.0"/>
    <path d="M56,26 C57,22 58,18 59,14" stroke-width="1.2"/>
    <path d="M59,14 C60,11 61,9 62,8" stroke-width="1.0"/>
    <!-- Side florets -->
    <path d="M42,27 C39,23 36,20 33,18" stroke-width="1.1"/>
    <path d="M33,18 C31,16 29,15 27,15" stroke-width="1.0"/>
    <path d="M58,27 C61,23 64,20 67,18" stroke-width="1.1"/>
    <path d="M67,18 C69,16 71,15 73,15" stroke-width="1.0"/>
  </g>
  <!-- Stippling for flower cluster shadow and stem -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="47" cy="28" r="0.7"/><circle cx="49" cy="28" r="0.7"/>
    <circle cx="51" cy="28" r="0.7"/><circle cx="53" cy="28" r="0.7"/>
    <circle cx="48" cy="30" r="0.7"/><circle cx="50" cy="30" r="0.7"/>
    <circle cx="52" cy="30" r="0.7"/><circle cx="46" cy="29" r="0.7"/>
    <circle cx="54" cy="29" r="0.7"/>
    <!-- Stem shadow -->
    <circle cx="50" cy="40" r="0.7"/><circle cx="50" cy="48" r="0.7"/>
    <circle cx="50" cy="62" r="0.7"/><circle cx="50" cy="70" r="0.7"/>
    <circle cx="50" cy="80" r="0.7"/>
    <!-- Bract shadows -->
    <circle cx="32" cy="36" r="0.7"/><circle cx="68" cy="36" r="0.7"/>
  </g>
</svg>