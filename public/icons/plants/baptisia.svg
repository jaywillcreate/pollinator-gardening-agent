<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wild Indigo / Baptisia - Top View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Central stem area -->
    <circle cx="50" cy="50" r="2" stroke-width="1.6"/>
    <!-- Flower spikes emerging from center -->
    <path d="M50,48 C50,42 50,36 50,28" stroke-width="1.5"/>
    <path d="M50,28 C49,25 50,22 50,20" stroke-width="1.2"/>
    <path d="M52,48 C54,42 56,36 58,30" stroke-width="1.3"/>
    <path d="M58,30 C59,27 60,25 60,23" stroke-width="1.1"/>
    <path d="M48,48 C46,42 44,36 42,30" stroke-width="1.3"/>
    <path d="M42,30 C41,27 40,25 40,23" stroke-width="1.1"/>
    <!-- Small pea-flower buds along spikes -->
    <circle cx="50" cy="24" r="1.5" stroke-width="1.0"/>
    <circle cx="50" cy="28" r="1.5" stroke-width="1.0"/>
    <circle cx="58" cy="28" r="1.3" stroke-width="1.0"/>
    <circle cx="42" cy="28" r="1.3" stroke-width="1.0"/>
    <!-- Trifoliate leaf clusters radiating outward -->
    <!-- Cluster 1 - North -->
    <path d="M50,46 C48,38 44,32 40,28" stroke-width="1.4"/>
    <path d="M50,46 C52,38 56,32 60,28" stroke-width="1.4"/>
    <!-- Cluster 2 - NE -->
    <path d="M54,48 C60,44 66,40 72,38" stroke-width="1.6"/>
    <path d="M72,38 C76,36 78,34 78,32" stroke-width="1.0"/>
    <path d="M72,38 C74,40 76,42 78,42" stroke-width="1.0"/>
    <path d="M72,38 C74,36 74,34 72,32" stroke-width="1.0"/>
    <!-- Cluster 3 - E -->
    <path d="M56,50 C62,50 68,50 76,50" stroke-width="1.6"/>
    <path d="M76,50 C80,48 82,46 82,44" stroke-width="1.0"/>
    <path d="M76,50 C80,52 82,54 82,56" stroke-width="1.0"/>
    <path d="M76,50 C80,50 82,48 84,50" stroke-width="1.0"/>
    <!-- Cluster 4 - SE -->
    <path d="M54,54 C60,58 66,62 72,66" stroke-width="1.6"/>
    <path d="M72,66 C76,68 78,70 78,72" stroke-width="1.0"/>
    <path d="M72,66 C74,64 76,62 78,62" stroke-width="1.0"/>
    <path d="M72,66 C74,68 74,70 72,72" stroke-width="1.0"/>
    <!-- Cluster 5 - S -->
    <path d="M50,56 C50,62 50,68 50,76" stroke-width="1.6"/>
    <path d="M50,76 C48,80 46,82 44,82" stroke-width="1.0"/>
    <path d="M50,76 C52,80 54,82 56,82" stroke-width="1.0"/>
    <path d="M50,76 C50,80 50,82 50,84" stroke-width="1.0"/>
    <!-- Cluster 6 - SW -->
    <path d="M46,54 C40,58 34,62 28,66" stroke-width="1.6"/>
    <path d="M28,66 C24,68 22,70 22,72" stroke-width="1.0"/>
    <path d="M28,66 C26,64 24,62 22,62" stroke-width="1.0"/>
    <path d="M28,66 C26,68 26,70 28,72" stroke-width="1.0"/>
    <!-- Cluster 7 - W -->
    <path d="M44,50 C38,50 32,50 24,50" stroke-width="1.6"/>
    <path d="M24,50 C20,48 18,46 18,44" stroke-width="1.0"/>
    <path d="M24,50 C20,52 18,54 18,56" stroke-width="1.0"/>
    <path d="M24,50 C20,50 18,48 16,50" stroke-width="1.0"/>
    <!-- Cluster 8 - NW -->
    <path d="M46,46 C40,42 34,38 28,34" stroke-width="1.6"/>
    <path d="M28,34 C24,32 22,30 22,28" stroke-width="1.0"/>
    <path d="M28,34 C26,36 24,38 22,38" stroke-width="1.0"/>
    <path d="M28,34 C26,32 26,30 28,28" stroke-width="1.0"/>
  </g>
  <!-- Stippling for center shadow and leaf overlap -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="49" cy="49" r="0.7"/><circle cx="51" cy="49" r="0.7"/>
    <circle cx="49" cy="51" r="0.7"/><circle cx="51" cy="51" r="0.7"/>
    <circle cx="50" cy="50" r="0.7"/>
    <!-- Branch junction shadows -->
    <circle cx="60" cy="44" r="0.7"/><circle cx="40" cy="44" r="0.7"/>
    <circle cx="60" cy="56" r="0.7"/><circle cx="40" cy="56" r="0.7"/>
    <circle cx="54" cy="42" r="0.7"/><circle cx="46" cy="42" r="0.7"/>
    <circle cx="54" cy="58" r="0.7"/><circle cx="46" cy="58" r="0.7"/>
    <!-- Trifoliate center dots -->
    <circle cx="76" cy="50" r="0.7"/><circle cx="24" cy="50" r="0.7"/>
    <circle cx="72" cy="38" r="0.7"/><circle cx="28" cy="34" r="0.7"/>
    <circle cx="72" cy="66" r="0.7"/><circle cx="28" cy="66" r="0.7"/>
    <circle cx="50" cy="76" r="0.7"/>
  </g>
</svg>