<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rudbeckia (Black-eyed Susan) - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,72 49,58 48,40" stroke-width="2.2"/>
    <!-- Branch stems with flower heads -->
    <path d="M49,55 C42,48 36,42 32,36" stroke-width="1.8"/>
    <path d="M49,50 C56,44 62,38 68,34" stroke-width="1.8"/>
    <!-- Leaves -->
    <path d="M50,72 C42,68 34,66 26,68" stroke-width="1.8"/>
    <path d="M26,68 C30,64 32,61 30,58" stroke-width="1.2"/>
    <path d="M50,64 C58,60 66,58 74,60" stroke-width="1.8"/>
    <path d="M74,60 C70,56 68,53 70,50" stroke-width="1.2"/>
    <!-- Main flower head - flat petals around dark center -->
    <ellipse cx="48" cy="32" rx="5" ry="4" stroke-width="1.8"/>
    <path d="M43,32 C38,30 33,29 30,30" stroke-width="1.3"/>
    <path d="M53,32 C58,30 63,29 66,30" stroke-width="1.3"/>
    <path d="M44,29 C40,25 37,22 35,20" stroke-width="1.2"/>
    <path d="M52,29 C56,25 59,22 62,20" stroke-width="1.2"/>
    <path d="M48,28 C48,24 48,20 48,17" stroke-width="1.2"/>
    <path d="M45,34 C42,38 39,41 37,43" stroke-width="1.2"/>
    <path d="M51,34 C54,38 57,41 59,43" stroke-width="1.2"/>
    <!-- Left branch flower -->
    <ellipse cx="32" cy="30" rx="4" ry="3" stroke-width="1.5"/>
    <path d="M28,30 C24,29 20,29 18,30" stroke-width="1.1"/>
    <path d="M36,30 C38,29 40,28 41,27" stroke-width="1.1"/>
    <path d="M30,27 C28,24 27,21 27,19" stroke-width="1.1"/>
    <path d="M34,27 C36,24 37,21 37,19" stroke-width="1.1"/>
    <path d="M32,28 C32,25 32,22 32,19" stroke-width="1.0"/>
    <path d="M30,33 C28,36 26,38 25,39" stroke-width="1.1"/>
    <path d="M34,33 C36,36 38,38 39,39" stroke-width="1.1"/>
    <!-- Right branch flower -->
    <ellipse cx="68" cy="28" rx="4" ry="3" stroke-width="1.5"/>
    <path d="M64,28 C62,27 60,26 58,27" stroke-width="1.1"/>
    <path d="M72,28 C74,27 76,27 78,28" stroke-width="1.1"/>
    <path d="M66,25 C64,22 63,19 63,17" stroke-width="1.1"/>
    <path d="M70,25 C72,22 73,19 73,17" stroke-width="1.1"/>
    <path d="M68,26 C68,23 68,20 68,17" stroke-width="1.0"/>
    <path d="M66,31 C64,34 62,36 61,37" stroke-width="1.1"/>
    <path d="M70,31 C72,34 74,36 75,37" stroke-width="1.1"/>
  </g>
  <!-- Stippling for dark centers -->
  <g fill="#2d3a2e" stroke="none">
    <!-- Main flower center -->
    <circle cx="47" cy="31" r="0.7"/><circle cx="49" cy="31" r="0.7"/>
    <circle cx="48" cy="33" r="0.7"/><circle cx="46" cy="33" r="0.7"/>
    <circle cx="50" cy="33" r="0.7"/><circle cx="48" cy="30" r="0.7"/>
    <circle cx="47" cy="32" r="0.7"/><circle cx="49" cy="32" r="0.7"/>
    <!-- Left flower center -->
    <circle cx="31" cy="29" r="0.7"/><circle cx="33" cy="29" r="0.7"/>
    <circle cx="32" cy="31" r="0.7"/><circle cx="30" cy="31" r="0.7"/>
    <circle cx="34" cy="31" r="0.7"/><circle cx="32" cy="29" r="0.7"/>
    <!-- Right flower center -->
    <circle cx="67" cy="27" r="0.7"/><circle cx="69" cy="27" r="0.7"/>
    <circle cx="68" cy="29" r="0.7"/><circle cx="66" cy="29" r="0.7"/>
    <circle cx="70" cy="29" r="0.7"/><circle cx="68" cy="27" r="0.7"/>
  </g>
</svg>