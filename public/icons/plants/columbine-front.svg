<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wild Columbine - Front View: delicate nodding flowers with spurs, lobed basal leaves -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,78 48,70 46,60" stroke-width="2.0"/>
    <!-- Stem curves to nodding flower -->
    <path d="M46,60 C44,54 42,48 40,44" stroke-width="1.6"/>
    <path d="M40,44 C38,40 36,38 34,36" stroke-width="1.4"/>
    <!-- Second stem -->
    <path d="M50,85 C52,76 56,66 60,58" stroke-width="1.8"/>
    <path d="M60,58 C62,52 64,46 66,42" stroke-width="1.4"/>
    <path d="M66,42 C68,38 68,36 66,34" stroke-width="1.2"/>
    <!-- Third small stem -->
    <path d="M46,60 C42,56 38,54 36,52" stroke-width="1.2"/>
    <!-- Nodding flower 1 (main) - bell shape with spurs -->
    <!-- Forward-facing petals -->
    <path d="M34,36 C30,38 28,42 30,46" stroke-width="1.4"/>
    <path d="M34,36 C38,38 40,42 38,46" stroke-width="1.4"/>
    <path d="M30,46 C32,48 36,48 38,46" stroke-width="1.2"/>
    <!-- Backward-pointing spurs -->
    <path d="M34,36 C32,30 28,24 24,18" stroke-width="1.2"/>
    <path d="M34,36 C34,30 34,24 34,16" stroke-width="1.2"/>
    <path d="M34,36 C36,30 40,24 44,18" stroke-width="1.2"/>
    <!-- Spur tips curl -->
    <path d="M24,18 C22,16 22,14 24,14" stroke-width="1.0"/>
    <path d="M34,16 C34,14 34,12 36,12" stroke-width="1.0"/>
    <path d="M44,18 C46,16 46,14 44,14" stroke-width="1.0"/>
    <!-- Stamens hanging down -->
    <path d="M32,46 L31,52" stroke-width="1.0"/>
    <path d="M34,46 L34,53" stroke-width="1.0"/>
    <path d="M36,46 L37,52" stroke-width="1.0"/>
    <!-- Nodding flower 2 (right) -->
    <path d="M66,34 C62,36 60,40 62,44" stroke-width="1.2"/>
    <path d="M66,34 C70,36 72,40 70,44" stroke-width="1.2"/>
    <path d="M62,44 C64,46 68,46 70,44" stroke-width="1.0"/>
    <!-- Spurs for flower 2 -->
    <path d="M66,34 C64,28 62,22 60,16" stroke-width="1.0"/>
    <path d="M66,34 C66,28 66,22 66,14" stroke-width="1.0"/>
    <path d="M66,34 C68,28 70,22 72,16" stroke-width="1.0"/>
    <!-- Bud on small stem -->
    <path d="M36,52 C34,50 32,50 32,52" stroke-width="1.2"/>
    <path d="M36,52 C36,50 38,50 38,52" stroke-width="1.2"/>
    <!-- Rounded lobed basal leaves -->
    <path d="M50,82 C42,78 32,76 24,80" stroke-width="2.2"/>
    <path d="M24,80 C22,78 20,80 20,82" stroke-width="1.6"/>
    <path d="M24,80 C24,78 22,76 20,76" stroke-width="1.4"/>
    <path d="M50,82 C58,78 68,76 76,80" stroke-width="2.2"/>
    <path d="M76,80 C78,78 80,80 80,82" stroke-width="1.6"/>
    <path d="M76,80 C76,78 78,76 80,76" stroke-width="1.4"/>
    <!-- Leaf lobes -->
    <path d="M28,80 C28,78 26,76 24,78" stroke-width="1.2"/>
    <path d="M72,80 C72,78 74,76 76,78" stroke-width="1.2"/>
  </g>
  <!-- Stippling for shadow -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="32" cy="42" r="0.7"/><circle cx="36" cy="42" r="0.7"/>
    <circle cx="34" cy="44" r="0.7"/><circle cx="34" cy="40" r="0.7"/>
    <circle cx="64" cy="40" r="0.7"/><circle cx="68" cy="40" r="0.7"/>
    <circle cx="66" cy="42" r="0.7"/><circle cx="48" cy="66" r="0.7"/>
    <circle cx="46" cy="64" r="0.7"/><circle cx="54" cy="62" r="0.7"/>
    <circle cx="56" cy="60" r="0.7"/><circle cx="44" cy="76" r="0.7"/>
    <circle cx="56" cy="76" r="0.7"/><circle cx="30" cy="78" r="0.7"/>
    <circle cx="70" cy="78" r="0.7"/><circle cx="50" cy="84" r="0.7"/>
    <circle cx="36" cy="54" r="0.7"/><circle cx="34" cy="50" r="0.7"/>
    <circle cx="66" cy="38" r="0.7"/><circle cx="40" cy="70" r="0.7"/>
    <circle cx="60" cy="66" r="0.7"/>
  </g>
</svg>