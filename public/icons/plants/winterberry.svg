<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Winterberry Holly top-view: dense rounded shrub canopy, small oval leaves -->
  <!-- Multiple stem centers -->
  <circle cx="48" cy="51" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="53" cy="49" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Dense branching pattern -->
  <line x1="48" y1="51" x2="30" y2="32" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="51" x2="24" y2="52" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="51" x2="32" y2="70" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="48" y1="51" x2="44" y2="28" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="53" y1="49" x2="72" y2="30" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="49" x2="78" y2="50" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="49" x2="68" y2="70" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="53" y1="49" x2="56" y2="28" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="76" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Fine outer twigs -->
  <line x1="30" y1="32" x2="22" y2="22" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="30" y1="32" x2="20" y2="34" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="72" y1="30" x2="80" y2="20" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="72" y1="30" x2="82" y2="34" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="24" y1="52" x2="14" y2="48" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="78" y1="50" x2="86" y2="48" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Small oval leaves scattered -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <ellipse cx="20" cy="22" rx="3" ry="1.8" transform="rotate(-30 20 22)"/>
    <ellipse cx="82" cy="22" rx="3" ry="1.8" transform="rotate(30 82 22)"/>
    <ellipse cx="14" cy="46" rx="3" ry="1.8" transform="rotate(-10 14 46)"/>
    <ellipse cx="88" cy="46" rx="3" ry="1.8" transform="rotate(10 88 46)"/>
    <ellipse cx="28" cy="76" rx="3" ry="1.8" transform="rotate(-50 28 76)"/>
    <ellipse cx="72" cy="76" rx="3" ry="1.8" transform="rotate(50 72 76)"/>
    <ellipse cx="50" cy="80" rx="3" ry="1.8"/>
    <ellipse cx="40" cy="24" rx="3" ry="1.8" transform="rotate(-20 40 24)"/>
    <ellipse cx="60" cy="24" rx="3" ry="1.8" transform="rotate(20 60 24)"/>
    <ellipse cx="18" cy="36" rx="2.5" ry="1.5" transform="rotate(-40 18 36)"/>
    <ellipse cx="84" cy="36" rx="2.5" ry="1.5" transform="rotate(40 84 36)"/>
  </g>
  <!-- Dense rounded canopy outline -->
  <path d="M50,14 C62,12 74,16 82,24 C88,32 90,42 88,52 C88,62 84,72 76,78 C68,84 60,86 50,86 C40,86 32,84 24,78 C16,72 12,62 12,52 C10,42 12,32 18,24 C26,16 38,12 50,14Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stippling - berry clusters -->
  <circle cx="26" cy="28" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="28" cy="26" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="74" cy="26" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="76" cy="28" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="16" cy="52" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="84" cy="52" r="0.7" fill="#2d3a2e" stroke="none"/>
