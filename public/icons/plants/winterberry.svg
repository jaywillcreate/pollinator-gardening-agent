  <circle cx="66" cy="74" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="64" cy="72" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="42" cy="60" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="60" cy="40" r="0.7" fill="#2d3a2e" stroke="none"/>
</svg>