<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Patio - Top View: Rectangle with paver grid lines -->
  <!-- Patio base -->
  <rect x="15" y="20" width="70" height="60" fill="#c4a882" stroke="#4a4a4a" stroke-width="1.5" rx="2"/>
  <!-- Paver grid - horizontal lines -->
  <line x1="15" y1="30" x2="85" y2="30" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="15" y1="40" x2="85" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="15" y1="60" x2="85" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="15" y1="70" x2="85" y2="70" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Paver grid - vertical lines (offset every other row for brick pattern) -->
  <line x1="29" y1="20" x2="29" y2="30" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="43" y1="20" x2="43" y2="30" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="57" y1="20" x2="57" y2="30" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="71" y1="20" x2="71" y2="30" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Offset row -->
  <line x1="22" y1="30" x2="22" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="36" y1="30" x2="36" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="50" y1="30" x2="50" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="64" y1="30" x2="64" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="78" y1="30" x2="78" y2="40" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Normal row -->
  <line x1="29" y1="40" x2="29" y2="50" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="43" y1="40" x2="43" y2="50" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="57" y1="40" x2="57" y2="50" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="71" y1="40" x2="71" y2="50" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Offset row -->
  <line x1="22" y1="50" x2="22" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="36" y1="50" x2="36" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="50" y1="50" x2="50" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="64" y1="50" x2="64" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="78" y1="50" x2="78" y2="60" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Normal row -->
  <line x1="29" y1="60" x2="29" y2="70" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="43" y1="60" x2="43" y2="70" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="57" y1="60" x2="57" y2="70" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="71" y1="60" x2="71" y2="70" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Offset row -->
  <line x1="22" y1="70" x2="22" y2="80" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="36" y1="70" x2="36" y2="80" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="50" y1="70" x2="50" y2="80" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="64" y1="70" x2="64" y2="80" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="78" y1="70" x2="78" y2="80" stroke="#4a4a4a" stroke-width="0.6" opacity="0.5"/>
</svg>