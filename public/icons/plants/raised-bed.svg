<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Raised Bed - Top View: Rectangular with double-line wood walls -->
  <!-- Inner fill (soil) -->
  <rect x="18" y="22" width="64" height="56" fill="#f5f5f0" stroke="none"/>
  <!-- Outer wall -->
  <rect x="15" y="20" width="70" height="60" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Inner wall (double-line effect) -->
  <rect x="20" y="25" width="60" height="50" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Wood fill between walls -->
  <path d="M15 20 L85 20 L85 80 L15 80 Z M20 25 L20 75 L80 75 L80 25 Z" fill="#c4a882" stroke="none" fill-rule="evenodd"/>
  <!-- Outer wall stroke again on top -->
  <rect x="15" y="20" width="70" height="60" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="20" y="25" width="60" height="50" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Corner joint details -->
  <line x1="15" y1="25" x2="20" y2="25" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="15" y1="75" x2="20" y2="75" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="80" y1="20" x2="80" y2="25" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="80" y1="75" x2="80" y2="80" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="20" y1="20" x2="20" y2="25" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="20" y1="75" x2="20" y2="80" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="85" y1="25" x2="80" y2="25" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="85" y1="75" x2="80" y2="75" stroke="#4a4a4a" stroke-width="0.8"/>
</svg>