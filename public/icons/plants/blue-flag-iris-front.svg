<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue Flag Iris (Iris versicolor) - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Sword-like leaves in fan arrangement from base -->
    <!-- Central tall leaf -->
    <path d="M50,85 C50,60 50,40 50,15" stroke-width="2.0"/>
    <path d="M50,15 C49,12 50,10 51,12" stroke-width="1.0"/>
    <!-- Left leaves -->
    <path d="M48,85 C44,60 38,40 30,18" stroke-width="1.8"/>
    <path d="M30,18 C29,15 30,14 31,15" stroke-width="1.0"/>
    <path d="M46,85 C40,65 32,48 22,28" stroke-width="1.6"/>
    <path d="M22,28 C21,25 22,24 23,25" stroke-width="1.0"/>
    <!-- Right leaves -->
    <path d="M52,85 C56,60 62,40 70,18" stroke-width="1.8"/>
    <path d="M70,18 C71,15 70,14 69,15" stroke-width="1.0"/>
    <path d="M54,85 C60,65 68,48 78,28" stroke-width="1.6"/>
    <path d="M78,28 C79,25 78,24 77,25" stroke-width="1.0"/>
    <!-- Flower stem -->
    <path d="M50,85 C50,70 50,55 50,35" stroke-width="2.2"/>
    <!-- Iris flower - 3 upright standards -->
    <path d="M50,35 C48,28 46,22 44,18" stroke-width="1.5"/>
    <path d="M44,18 C42,14 42,10 44,8" stroke-width="1.3"/>
    <path d="M44,8 C46,6 48,6 50,8" stroke-width="1.2"/>
    <path d="M50,8 C52,6 54,6 56,8" stroke-width="1.2"/>
    <path d="M56,8 C58,10 58,14 56,18" stroke-width="1.3"/>
    <path d="M56,18 C54,22 52,28 50,35" stroke-width="1.5"/>
    <!-- Center standard -->
    <path d="M50,30 C50,24 50,18 50,12" stroke-width="1.3"/>
    <path d="M50,12 C49,10 50,8 51,10" stroke-width="1.0"/>
    <!-- 3 drooping falls (outer petals) -->
    <path d="M46,32 C42,36 36,40 30,42" stroke-width="1.6"/>
    <path d="M30,42 C26,43 24,42 24,40" stroke-width="1.3"/>
    <path d="M24,40 C24,38 26,36 30,36" stroke-width="1.2"/>
    <path d="M30,36 C34,36 38,34 42,32" stroke-width="1.0"/>
    <path d="M54,32 C58,36 64,40 70,42" stroke-width="1.6"/>
    <path d="M70,42 C74,43 76,42 76,40" stroke-width="1.3"/>
    <path d="M76,40 C76,38 74,36 70,36" stroke-width="1.2"/>
    <path d="M70,36 C66,36 62,34 58,32" stroke-width="1.0"/>
    <!-- Center fall (facing viewer, foreshortened) -->
    <path d="M48,34 C47,38 46,42 46,44" stroke-width="1.3"/>
    <path d="M52,34 C53,38 54,42 54,44" stroke-width="1.3"/>
    <path d="M46,44 C48,46 52,46 54,44" stroke-width="1.2"/>
    <!-- Beard/signal on falls -->
    <path d="M34,39 L36,38" stroke-width="1.0"/>
    <path d="M66,39 L64,38" stroke-width="1.0"/>
  </g>
  <!-- Stippling for flower center and leaf shadows -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="49" cy="30" r="0.7"/><circle cx="51" cy="30" r="0.7"/>
    <circle cx="48" cy="28" r="0.7"/><circle cx="52" cy="28" r="0.7"/>
    <circle cx="50" cy="32" r="0.7"/>
    <!-- Fall shadows -->
    <circle cx="28" cy="40" r="0.7"/><circle cx="30" cy="42" r="0.7"/>
    <circle cx="72" cy="40" r="0.7"/><circle cx="70" cy="42" r="0.7"/>
    <circle cx="49" cy="42" r="0.7"/><circle cx="51" cy="42" r="0.7"/>
    <!-- Leaf base shadows -->
    <circle cx="48" cy="78" r="0.7"/><circle cx="52" cy="78" r="0.7"/>
    <circle cx="50" cy="82" r="0.7"/>
    <circle cx="46" cy="75" r="0.7"/><circle cx="54" cy="75" r="0.7"/>
    <!-- Standard shadows -->
    <circle cx="46" cy="14" r="0.7"/><circle cx="54" cy="14" r="0.7"/>
    <circle cx="50" cy="16" r="0.7"/>
  </g>
</svg>