<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fence - Top View: Double lines with perpendicular post tick marks -->
  <!-- Fence runs in an L-shape -->
  <!-- Horizontal run - double lines -->
  <line x1="10" y1="30" x2="70" y2="30" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="10" y1="34" x2="70" y2="34" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Vertical run - double lines -->
  <line x1="70" y1="30" x2="70" y2="90" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="74" y1="30" x2="74" y2="90" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Corner connection -->
  <line x1="70" y1="30" x2="74" y2="30" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="70" y1="34" x2="74" y2="34" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Post tick marks - horizontal run -->
  <line x1="10" y1="27" x2="10" y2="37" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="22" y1="27" x2="22" y2="37" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="34" y1="27" x2="34" y2="37" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="46" y1="27" x2="46" y2="37" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="58" y1="27" x2="58" y2="37" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Post tick marks - vertical run -->
  <line x1="67" y1="44" x2="77" y2="44" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="67" y1="56" x2="77" y2="56" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="67" y1="68" x2="77" y2="68" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="67" y1="80" x2="77" y2="80" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="67" y1="90" x2="77" y2="90" stroke="#4a4a4a" stroke-width="1.5"/>
</svg>