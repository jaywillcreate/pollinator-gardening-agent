    <path d="M50,30 C56,26 64,24 68,26" stroke-width="1.3"/>
    <path d="M50,28 C52,22 54,18 52,14" stroke-width="1.0"/>
    <circle cx="52" cy="14" r="0.9" stroke-width="0.8"/>
    <!-- Fourth flower -->
    <path d="M50,36 C44,32 36,30 32,32" stroke-width="1.4"/>
    <path d="M50,36 C56,32 64,30 68,32" stroke-width="1.4"/>
    <path d="M50,34 C48,28 46,24 48,20" stroke-width="1.0"/>
    <circle cx="48" cy="20" r="0.9" stroke-width="0.8"/>
    <!-- Fifth flower -->
    <path d="M50,42 C44,38 38,36 34,38" stroke-width="1.4"/>
    <path d="M50,42 C56,38 62,36 66,38" stroke-width="1.4"/>
    <path d="M50,40 C52,34 54,30 52,26" stroke-width="1.0"/>
    <circle cx="52" cy="26" r="0.9" stroke-width="0.8"/>
    <!-- Toothed leaves along stem -->
    <!-- Upper leaf pair -->
    <path d="M50,50 C42,46 32,44 24,46" stroke-width="1.6"/>
    <path d="M24,46 C26,44 28,46 26,48" stroke-width="1.0"/>
    <path d="M28,45 C30,43 32,45 30,47" stroke-width="1.0"/>
    <path d="M50,50 C58,46 68,44 76,46" stroke-width="1.6"/>
    <path d="M76,46 C74,44 72,46 74,48" stroke-width="1.0"/>
    <path d="M72,45 C70,43 68,45 70,47" stroke-width="1.0"/>
    <!-- Mid leaf pair -->
    <path d="M50,62 C42,58 30,56 22,58" stroke-width="1.9"/>
    <path d="M22,58 C24,56 26,58 24,60" stroke-width="1.0"/>
    <path d="M28,57 C30,55 32,57 30,59" stroke-width="1.0"/>
    <path d="M50,62 C58,58 70,56 78,58" stroke-width="1.9"/>
    <path d="M78,58 C76,56 74,58 76,60" stroke-width="1.0"/>
    <path d="M72,57 C70,55 68,57 70,59" stroke-width="1.0"/>
