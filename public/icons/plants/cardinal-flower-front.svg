<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cardinal Flower front-view: tall spike of tubular flowers, toothed leaves, protruding stamens -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,72 50,50 50,16" stroke-width="2.2"/>
    <!-- Tubular flowers along upper third - each with 2 lip petals and protruding stamen -->
    <!-- Top flower -->
    <path d="M50,18 C46,14 42,12 38,14" stroke-width="1.2"/>
    <path d="M50,18 C54,14 58,12 62,14" stroke-width="1.2"/>
    <path d="M50,18 C48,12 46,8 48,6" stroke-width="1.1"/>
    <path d="M50,18 C52,12 54,8 52,6" stroke-width="1.1"/>
    <path d="M50,16 C50,10 50,6 50,2" stroke-width="1.0"/>
    <circle cx="50" cy="2" r="1.0" stroke-width="0.8"/>
    <!-- Second flower -->
    <path d="M50,24 C44,20 38,18 34,20" stroke-width="1.3"/>
    <path d="M50,24 C56,20 62,18 66,20" stroke-width="1.3"/>
    <path d="M50,22 C46,16 44,12 46,10" stroke-width="1.0"/>
    <path d="M46,10 C44,8 42,10 44,12" stroke-width="1.0"/>
    <path d="M50,22 C48,16 46,12 48,8" stroke-width="1.0"/>
    <circle cx="48" cy="8" r="0.9" stroke-width="0.8"/>
    <!-- Third flower -->
