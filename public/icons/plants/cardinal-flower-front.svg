  <!-- Stippling for flower depth and shadows -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="42" cy="14" r="0.7"/><circle cx="58" cy="14" r="0.7"/>
    <circle cx="38" cy="20" r="0.7"/><circle cx="62" cy="20" r="0.7"/>
    <circle cx="36" cy="26" r="0.7"/><circle cx="64" cy="26" r="0.7"/>
