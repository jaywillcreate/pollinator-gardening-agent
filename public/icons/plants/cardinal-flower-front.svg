    <circle cx="28" cy="48" r="0.7"/><circle cx="72" cy="48" r="0.7"/>
    <circle cx="26" cy="60" r="0.7"/><circle cx="74" cy="60" r="0.7"/>
    <circle cx="24" cy="72" r="0.7"/><circle cx="76" cy="72" r="0.7"/>
    <circle cx="34" cy="46" r="0.7"/><circle cx="66" cy="46" r="0.7"/>
    <circle cx="32" cy="58" r="0.7"/><circle cx="68" cy="58" r="0.7"/>
    <circle cx="30" cy="70" r="0.7"/><circle cx="70" cy="70" r="0.7"/>
    <circle cx="40" cy="12" r="0.7"/><circle cx="60" cy="12" r="0.7"/>
    <circle cx="34" cy="30" r="0.7"/><circle cx="66" cy="30" r="0.7"/>
    <circle cx="40" cy="36" r="0.7"/><circle cx="60" cy="36" r="0.7"/>
