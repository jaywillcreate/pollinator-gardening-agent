<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Winterberry Holly front-view: dense rounded shrub, small leaves, berry clusters -->
  <!-- Multiple stems from base -->
  <path d="M40,95 C38,85 36,76 34,68 C32,60 30,54 28,48" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M48,95 C48,84 48,72 48,62 C48,54 46,46 44,40" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M52,95 C52,84 52,72 52,62 C52,54 54,46 56,40" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M60,95 C62,85 64,76 66,68 C68,60 70,54 72,48" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Dense branching -->
  <path d="M28,48 C24,42 18,36 14,32" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M28,48 C22,46 18,42 14,40" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M44,40 C40,34 36,28 32,24" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M44,40 C42,34 38,28 36,22" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M56,40 C60,34 64,28 68,24" fill="none" stroke="#2d3a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M56,40 C58,34 62,28 64,22" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M72,48 C76,42 82,36 86,32" fill="none" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M72,48 C78,46 82,42 86,40" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M48,50 C48,42 48,34 48,26 C48,22 46,18 44,14" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M52,50 C52,42 52,34 52,26 C52,22 54,18 56,14" fill="none" stroke="#2d3a2e" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Small oval leaves -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.7" stroke-linecap="round">
    <ellipse cx="14" cy="30" rx="2.5" ry="1.5" transform="rotate(-30 14 30)"/>
    <ellipse cx="86" cy="30" rx="2.5" ry="1.5" transform="rotate(30 86 30)"/>
    <ellipse cx="32" cy="22" rx="2.5" ry="1.5" transform="rotate(-15 32 22)"/>
    <ellipse cx="68" cy="22" rx="2.5" ry="1.5" transform="rotate(15 68 22)"/>
    <ellipse cx="44" cy="14" rx="2.5" ry="1.5" transform="rotate(-10 44 14)"/>
    <ellipse cx="56" cy="14" rx="2.5" ry="1.5" transform="rotate(10 56 14)"/>
    <ellipse cx="14" cy="40" rx="2.5" ry="1.5" transform="rotate(-5 14 40)"/>
    <ellipse cx="86" cy="40" rx="2.5" ry="1.5" transform="rotate(5 86 40)"/>
  </g>
  <!-- Berry clusters as stipple dot groups along branches -->
  <g fill="#2d3a2e" stroke="none">
    <!-- Left berry cluster -->
    <circle cx="16" cy="35" r="0.7"/><circle cx="18" cy="34" r="0.7"/><circle cx="17" cy="36" r="0.7"/><circle cx="19" cy="36" r="0.7"/>
    <!-- Inner-left berry cluster -->
    <circle cx="34" cy="26" r="0.7"/><circle cx="36" cy="25" r="0.7"/><circle cx="35" cy="27" r="0.7"/><circle cx="37" cy="27" r="0.7"/>
    <!-- Center-left berry cluster -->
    <circle cx="46" cy="18" r="0.7"/><circle cx="44" cy="17" r="0.7"/><circle cx="45" cy="19" r="0.7"/>
    <!-- Center-right berry cluster -->
    <circle cx="54" cy="18" r="0.7"/><circle cx="56" cy="17" r="0.7"/><circle cx="55" cy="19" r="0.7"/>
    <!-- Inner-right berry cluster -->
    <circle cx="66" cy="26" r="0.7"/><circle cx="64" cy="25" r="0.7"/><circle cx="65" cy="27" r="0.7"/><circle cx="63" cy="27" r="0.7"/>
    <!-- Right berry cluster -->
    <circle cx="84" cy="35" r="0.7"/><circle cx="82" cy="34" r="0.7"/><circle cx="83" cy="36" r="0.7"/><circle cx="81" cy="36" r="0.7"/>
  </g>
  <!-- Dense rounded shrub canopy outline -->
  <path d="M10,44 C6,36 8,28 14,22 C20,16 28,12 38,10 C44,8 48,8 50,8 C52,8 56,8 62,10 C72,12 80,16 86,22 C92,28 94,36 90,44 C88,50 82,54 74,56 C66,58 58,60 50,60 C42,60 34,58 26,56 C18,54 12,50 10,44Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
</svg>