<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Butterfly Weed - Front View: multiple stems with flat-topped umbels -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,75 49,60 48,45" stroke-width="2.2"/>
    <!-- Secondary stems -->
    <path d="M38,85 C39,76 40,65 42,52" stroke-width="2.0"/>
    <path d="M62,85 C61,76 59,64 57,50" stroke-width="2.0"/>
    <!-- Branching flower stems from main -->
    <path d="M48,45 C46,40 42,36 38,32" stroke-width="1.4"/>
    <path d="M48,45 C49,38 50,34 50,28" stroke-width="1.4"/>
    <path d="M48,45 C52,40 56,36 60,33" stroke-width="1.4"/>
    <!-- Branching from left stem -->
    <path d="M42,52 C40,46 36,42 32,38" stroke-width="1.2"/>
    <path d="M42,52 C41,46 40,40 40,35" stroke-width="1.2"/>
    <!-- Branching from right stem -->
    <path d="M57,50 C59,44 62,40 66,36" stroke-width="1.2"/>
    <path d="M57,50 C57,44 58,38 59,33" stroke-width="1.2"/>
    <!-- Lance-shaped alternate leaves -->
    <path d="M48,65 C40,62 34,64 28,68" stroke-width="1.8"/>
    <path d="M48,58 C56,55 62,56 68,60" stroke-width="1.6"/>
    <path d="M42,70 C48,68 54,70 60,74" stroke-width="1.8"/>
    <path d="M57,62 C52,60 46,61 40,64" stroke-width="1.6"/>
    <path d="M38,78 C32,76 26,78 22,82" stroke-width="1.8"/>
    <path d="M62,78 C68,76 74,78 78,82" stroke-width="1.8"/>
    <!-- Tiny star flowers at umbel tops -->
    <g stroke-width="1.0">
      <!-- Top center umbel -->
      <path d="M48,28 L50,24 L52,28 L48,26 L52,26Z"/>
      <path d="M46,30 L48,26 L50,30 L46,28 L50,28Z"/>
      <path d="M52,30 L54,26 L56,30 L52,28 L56,28Z"/>
      <!-- Left umbel -->
      <path d="M36,32 L38,28 L40,32 L36,30 L40,30Z"/>
      <path d="M34,34 L36,30 L38,34 L34,32 L38,32Z"/>
      <path d="M30,38 L32,34 L34,38 L30,36 L34,36Z"/>
      <path d="M28,40 L30,36 L32,40 L28,38 L32,38Z"/>
      <!-- Right umbel -->
      <path d="M58,33 L60,29 L62,33 L58,31 L62,31Z"/>
      <path d="M62,34 L64,30 L66,34 L62,32 L66,32Z"/>
      <path d="M64,36 L66,32 L68,36 L64,34 L68,34Z"/>
      <!-- Far left -->
      <path d="M38,35 L40,31 L42,35 L38,33 L42,33Z"/>
      <!-- Far right -->
      <path d="M57,33 L59,29 L61,33 L57,31 L61,31Z"/>
    </g>
  </g>
  <!-- Stippling for shadow -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="46" cy="72" r="0.7"/><circle cx="44" cy="74" r="0.7"/>
    <circle cx="56" cy="70" r="0.7"/><circle cx="58" cy="72" r="0.7"/>
    <circle cx="50" cy="80" r="0.7"/><circle cx="48" cy="78" r="0.7"/>
    <circle cx="52" cy="82" r="0.7"/><circle cx="40" cy="80" r="0.7"/>
    <circle cx="60" cy="80" r="0.7"/><circle cx="34" cy="66" r="0.7"/>
    <circle cx="64" cy="58" r="0.7"/><circle cx="30" cy="70" r="0.7"/>
    <circle cx="44" cy="62" r="0.7"/><circle cx="54" cy="64" r="0.7"/>
    <circle cx="36" cy="44" r="0.7"/><circle cx="64" cy="42" r="0.7"/>
    <circle cx="48" cy="50" r="0.7"/><circle cx="42" cy="48" r="0.7"/>
    <circle cx="56" cy="46" r="0.7"/><circle cx="26" cy="80" r="0.7"/>
    <circle cx="74" cy="80" r="0.7"/>
  </g>
</svg>