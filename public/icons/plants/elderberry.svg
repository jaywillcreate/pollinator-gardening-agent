<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Elderberry top-view: compound pinnate leaves forming lacy canopy, large shrub -->
  <!-- Multiple stem centers -->
  <circle cx="48" cy="52" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="54" cy="48" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="1.2" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Main branches -->
  <line x1="48" y1="52" x2="24" y2="28" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="20" y2="58" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="34" y2="78" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="48" x2="78" y2="28" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="54" y1="48" x2="82" y2="52" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="20" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="64" y2="76" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Compound pinnate leaf patterns (paired leaflets along branch) -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <!-- Leaf pair along top-left branch -->
    <path d="M34,38 C30,36 28,38 30,42"/>
    <path d="M34,38 C38,36 40,38 38,42"/>
    <path d="M28,32 C24,30 22,32 24,36"/>
    <path d="M28,32 C32,30 34,32 32,36"/>
    <!-- Leaf pair along top-right branch -->
    <path d="M68,36 C64,34 62,36 64,40"/>
    <path d="M68,36 C72,34 74,36 72,40"/>
    <path d="M74,32 C70,30 68,32 70,36"/>
    <path d="M74,32 C78,30 80,32 78,36"/>
    <!-- Leaf pair along left branch -->
    <path d="M28,56 C24,54 22,56 24,60"/>
    <path d="M28,56 C32,54 34,56 32,60"/>
    <!-- Leaf pair along bottom branches -->
    <path d="M42,68 C38,66 36,68 38,72"/>
    <path d="M42,68 C46,66 48,68 46,72"/>
    <path d="M58,66 C54,64 52,66 54,70"/>
    <path d="M58,66 C62,64 64,66 62,70"/>
  </g>
  <!-- Lacy canopy outline -->
  <path d="M50,12 C62,10 74,16 82,24 C88,32 90,42 88,52 C90,60 86,72 78,80 C70,86 60,88 50,88 C40,88 30,86 22,80 C14,72 10,60 12,52 C10,42 12,32 18,24 C26,16 38,10 50,12Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flat-topped flower cluster (umbel) visible from above - small circles -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.7" stroke-linecap="round">
    <circle cx="22" cy="26" r="2.5"/>
    <circle cx="80" cy="26" r="2.5"/>
    <circle cx="86" cy="54" r="2.5"/>
    <circle cx="50" cy="16" r="2.5"/>
    <circle cx="32" cy="82" r="2.5"/>
    <circle cx="68" cy="80" r="2.5"/>
  </g>
  <!-- Stippling -->
  <circle cx="36" cy="20" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="64" cy="18" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="16" cy="44" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="84" cy="40" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="22" cy="70" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="78" cy="68" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="50" cy="78" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="40" cy="44" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="62" cy="56" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="46" cy="64" r="0.7" fill="#2d3a2e" stroke="none"/>
</svg>