<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Viburnum top-view: rounded shrub canopy with flat-topped snowball flower clusters -->
  <!-- Multiple stem centers -->
  <circle cx="48" cy="52" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="53" cy="48" r="1.5" fill="none" stroke="#2d3a2e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Main branches - opposite branching pattern -->
  <line x1="48" y1="52" x2="28" y2="32" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="28" y2="72" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="22" y2="52" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="53" y1="48" x2="74" y2="28" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="48" x2="74" y2="68" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="48" x2="80" y2="48" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="24" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="78" stroke="#2d3a2e" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Opposite leaf pairs along branches -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <!-- Opposite leaves on top branch -->
    <path d="M48,34 C44,30 42,32 44,36 C46,36 48,36 48,34Z"/>
    <path d="M52,34 C56,30 58,32 56,36 C54,36 52,36 52,34Z"/>
    <!-- Opposite leaves on left branch -->
    <path d="M34,40 C30,38 28,40 30,44 C32,44 34,42 34,40Z"/>
    <path d="M36,44 C34,48 36,50 38,48 C38,46 38,44 36,44Z"/>
    <!-- Opposite leaves on right branch -->
    <path d="M66,36 C70,34 72,36 70,40 C68,40 66,38 66,36Z"/>
    <path d="M64,40 C66,44 64,46 62,44 C62,42 62,40 64,40Z"/>
    <!-- Opposite leaves on bottom -->
    <path d="M48,66 C44,68 42,66 44,62 C46,62 48,64 48,66Z"/>
    <path d="M52,66 C56,68 58,66 56,62 C54,62 52,64 52,66Z"/>
  </g>
  <!-- Prominent flat-topped snowball flower clusters -->
  <g fill="none" stroke="#2d3a2e" stroke-width="0.8" stroke-linecap="round">
    <!-- Top flower cluster -->
    <circle cx="50" cy="18" r="5"/>
    <circle cx="47" cy="16" r="2"/><circle cx="53" cy="16" r="2"/><circle cx="50" cy="20" r="2"/><circle cx="46" cy="20" r="1.5"/><circle cx="54" cy="20" r="1.5"/>
    <!-- Left flower cluster -->
    <circle cx="18" cy="50" r="4.5"/>
    <circle cx="16" cy="48" r="1.8"/><circle cx="20" cy="48" r="1.8"/><circle cx="18" cy="52" r="1.8"/><circle cx="15" cy="52" r="1.3"/>
    <!-- Right flower cluster -->
    <circle cx="84" cy="48" r="4.5"/>
    <circle cx="82" cy="46" r="1.8"/><circle cx="86" cy="46" r="1.8"/><circle cx="84" cy="50" r="1.8"/><circle cx="87" cy="50" r="1.3"/>
    <!-- Bottom flower cluster -->
    <circle cx="50" cy="82" r="4.5"/>
    <circle cx="48" cy="80" r="1.8"/><circle cx="52" cy="80" r="1.8"/><circle cx="50" cy="84" r="1.8"/><circle cx="47" cy="84" r="1.3"/>
    <!-- Top-left cluster -->
    <circle cx="24" cy="28" r="4"/>
    <circle cx="22" cy="26" r="1.5"/><circle cx="26" cy="26" r="1.5"/><circle cx="24" cy="30" r="1.5"/>
    <!-- Top-right cluster -->
    <circle cx="78" cy="24" r="4"/>
    <circle cx="76" cy="22" r="1.5"/><circle cx="80" cy="22" r="1.5"/><circle cx="78" cy="26" r="1.5"/>
  </g>
  <!-- Rounded canopy outline -->
  <path d="M50,10 C64,10 76,16 84,26 C90,34 92,44 90,54 C90,64 86,74 78,80 C70,86 60,90 50,90 C40,90 30,86 22,80 C14,74 10,64 10,54 C8,44 10,34 16,26 C24,16 36,10 50,10Z" fill="none" stroke="#2d3a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stippling -->
  <circle cx="36" cy="16" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="66" cy="14" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="14" cy="38" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="88" cy="36" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="16" cy="66" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="84" cy="64" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="36" cy="84" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="66" cy="82" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="58" cy="56" r="0.7" fill="#2d3a2e" stroke="none"/>
  <circle cx="42" cy="44" r="0.7" fill="#2d3a2e" stroke="none"/>
</svg>