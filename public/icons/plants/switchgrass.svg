    <circle cx="51" cy="54" r="0.7"/><circle cx="46" cy="50" r="0.7"/><circle cx="54" cy="50" r="0.7"/>
    <circle cx="50" cy="53" r="0.7"/><circle cx="48" cy="52" r="0.7"/><circle cx="52" cy="47" r="0.7"/>
    <circle cx="45" cy="48" r="0.7"/><circle cx="55" cy="52" r="0.7"/>
