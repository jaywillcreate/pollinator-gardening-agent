<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Echinacea (Purple Coneflower) - Front View -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M50,85 C50,75 49,60 50,30" stroke-width="2.2"/>
    <!-- Alternate leaves on stem -->
    <path d="M50,70 C42,64 32,60 24,62" stroke-width="1.8"/>
    <path d="M24,62 C28,58 30,55 29,52" stroke-width="1.2"/>
    <path d="M50,58 C58,52 68,50 76,52" stroke-width="1.8"/>
    <path d="M76,52 C72,48 70,45 71,42" stroke-width="1.2"/>
    <path d="M50,48 C44,43 36,41 30,43" stroke-width="1.5"/>
    <!-- Prominent raised cone -->
    <ellipse cx="50" cy="22" rx="8" ry="10" stroke-width="2.0"/>
    <!-- Drooping petals hanging down from cone -->
    <path d="M42,26 C38,32 34,40 32,46" stroke-width="1.5"/>
    <path d="M44,28 C41,35 39,43 38,48" stroke-width="1.4"/>
    <path d="M58,26 C62,32 66,40 68,46" stroke-width="1.5"/>
    <path d="M56,28 C59,35 61,43 62,48" stroke-width="1.4"/>
    <path d="M46,30 C44,37 43,44 44,50" stroke-width="1.3"/>
    <path d="M54,30 C56,37 57,44 56,50" stroke-width="1.3"/>
    <!-- Back petals (thinner, further) -->
    <path d="M44,18 C38,14 32,12 28,14" stroke-width="1.0"/>
    <path d="M56,18 C62,14 68,12 72,14" stroke-width="1.0"/>
    <path d="M50,14 C50,10 50,6 50,4" stroke-width="1.0"/>
  </g>
  <!-- Stippling for cone shading -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="48" cy="19" r="0.7"/><circle cx="52" cy="19" r="0.7"/>
    <circle cx="50" cy="17" r="0.7"/><circle cx="50" cy="21" r="0.7"/>
    <circle cx="46" cy="21" r="0.7"/><circle cx="54" cy="21" r="0.7"/>
    <circle cx="48" cy="23" r="0.7"/><circle cx="52" cy="23" r="0.7"/>
    <circle cx="50" cy="25" r="0.7"/><circle cx="47" cy="25" r="0.7"/>
    <circle cx="53" cy="25" r="0.7"/><circle cx="49" cy="15" r="0.7"/>
    <circle cx="51" cy="15" r="0.7"/><circle cx="46" cy="17" r="0.7"/>
    <circle cx="54" cy="17" r="0.7"/><circle cx="50" cy="23" r="0.7"/>
    <circle cx="48" cy="27" r="0.7"/><circle cx="52" cy="27" r="0.7"/>
    <circle cx="46" cy="23" r="0.7"/><circle cx="54" cy="23" r="0.7"/>
    <circle cx="50" cy="19" r="0.7"/><circle cx="48" cy="21" r="0.7"/>
    <circle cx="52" cy="21" r="0.7"/><circle cx="49" cy="27" r="0.7"/>
    <circle cx="51" cy="27" r="0.7"/>
  </g>
</svg>