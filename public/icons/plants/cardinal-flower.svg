<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cardinal Flower top-view: spike from above, rosette of tubular flowers with protruding stamens -->
  <g fill="none" stroke="#2d3a2e" stroke-linecap="round">
    <!-- Central spike core -->
    <circle cx="50" cy="50" r="4" stroke-width="2.0"/>
    <!-- Inner ring of tubular flower openings (5 petals each, seen from above) -->
    <!-- Flower 1 - top -->
    <path d="M50,38 C48,34 46,28 48,24" stroke-width="1.3"/>
    <path d="M50,38 C52,34 54,28 52,24" stroke-width="1.3"/>
    <path d="M50,38 C46,36 42,34 40,30" stroke-width="1.2"/>
    <path d="M50,38 C54,36 58,34 60,30" stroke-width="1.2"/>
    <!-- Flower 2 - right -->
    <path d="M62,50 C66,48 72,46 76,48" stroke-width="1.3"/>
    <path d="M62,50 C66,52 72,54 76,52" stroke-width="1.3"/>
    <path d="M62,50 C64,46 68,42 70,40" stroke-width="1.2"/>
    <path d="M62,50 C64,54 68,58 70,60" stroke-width="1.2"/>
    <!-- Flower 3 - bottom -->
    <path d="M50,62 C48,66 46,72 48,76" stroke-width="1.3"/>
    <path d="M50,62 C52,66 54,72 52,76" stroke-width="1.3"/>
    <path d="M50,62 C46,64 42,66 40,70" stroke-width="1.2"/>
    <path d="M50,62 C54,64 58,66 60,70" stroke-width="1.2"/>
    <!-- Flower 4 - left -->
    <path d="M38,50 C34,48 28,46 24,48" stroke-width="1.3"/>
    <path d="M38,50 C34,52 28,54 24,52" stroke-width="1.3"/>
    <path d="M38,50 C36,46 32,42 30,40" stroke-width="1.2"/>
    <path d="M38,50 C36,54 32,58 30,60" stroke-width="1.2"/>
    <!-- Protruding stamens (long thin lines extending from each flower) -->
    <path d="M50,34 C50,28 50,22 50,18" stroke-width="1.0"/>
    <path d="M66,50 C72,50 78,50 82,50" stroke-width="1.0"/>
    <path d="M50,66 C50,72 50,78 50,82" stroke-width="1.0"/>
    <path d="M34,50 C28,50 22,50 18,50" stroke-width="1.0"/>
    <!-- Stamen tips -->
    <circle cx="50" cy="17" r="1.2" stroke-width="1.0"/>
    <circle cx="83" cy="50" r="1.2" stroke-width="1.0"/>
    <circle cx="50" cy="83" r="1.2" stroke-width="1.0"/>
    <circle cx="17" cy="50" r="1.2" stroke-width="1.0"/>
    <!-- Leaf tips peeking between flowers -->
    <path d="M50,50 C42,42 30,30 22,22" stroke-width="1.6"/>
    <path d="M50,50 C58,42 70,30 78,22" stroke-width="1.6"/>
    <path d="M50,50 C58,58 70,70 78,78" stroke-width="1.6"/>
    <path d="M50,50 C42,58 30,70 22,78" stroke-width="1.6"/>
  </g>
  <!-- Stippling for shadows in flower tubes -->
  <g fill="#2d3a2e" stroke="none">
    <circle cx="48" cy="32" r="0.7"/><circle cx="52" cy="32" r="0.7"/>
    <circle cx="50" cy="30" r="0.7"/><circle cx="68" cy="48" r="0.7"/>
    <circle cx="68" cy="52" r="0.7"/><circle cx="70" cy="50" r="0.7"/>
    <circle cx="48" cy="68" r="0.7"/><circle cx="52" cy="68" r="0.7"/>
    <circle cx="50" cy="70" r="0.7"/><circle cx="32" cy="48" r="0.7"/>
    <circle cx="32" cy="52" r="0.7"/><circle cx="30" cy="50" r="0.7"/>
    <circle cx="46" cy="46" r="0.7"/><circle cx="54" cy="46" r="0.7"/>
    <circle cx="54" cy="54" r="0.7"/><circle cx="46" cy="54" r="0.7"/>
    <circle cx="44" cy="28" r="0.7"/><circle cx="56" cy="28" r="0.7"/>
    <circle cx="72" cy="44" r="0.7"/><circle cx="72" cy="56" r="0.7"/>
    <circle cx="44" cy="72" r="0.7"/><circle cx="56" cy="72" r="0.7"/>
    <circle cx="28" cy="44" r="0.7"/><circle cx="28" cy="56" r="0.7"/>
    <!-- Leaf shadow stipples -->
    <circle cx="26" cy="26" r="0.7"/><circle cx="74" cy="26" r="0.7"/>
    <circle cx="74" cy="74" r="0.7"/><circle cx="26" cy="74" r="0.7"/>
    <circle cx="30" cy="34" r="0.7"/><circle cx="34" cy="30" r="0.7"/>
    <circle cx="66" cy="30" r="0.7"/><circle cx="70" cy="34" r="0.7"/>
    <circle cx="66" cy="70" r="0.7"/><circle cx="70" cy="66" r="0.7"/>
  </g>
</svg>